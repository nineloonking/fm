<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>認親認戚產生器 · 家庭人物關係圖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
        #mynetwork {
            width: 100%;
            height: 520px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            background: #f8fafc;
            touch-action: none;
        }
        .modal {
            animation: modalPop 0.3s ease-out;
        }
        @keyframes modalPop {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .mobile-hint {
            animation: pulse 2s infinite;
        }
        /* 讓 Modal 在手機上可以捲動 + 按鈕永遠可見 */
        .modal-content {
            max-height: 90vh;
            overflow-y: auto;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div class="max-w-7xl mx-auto px-4 py-6">
        <!-- 頂部導航 -->
        <div class="flex items-center justify-between mb-8 bg-white rounded-2xl shadow-sm border border-slate-200 px-6 py-4">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-red-500 text-white rounded-2xl flex items-center justify-center text-2xl">👪</div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">認親認戚產生器</h1>
                    <p class="text-slate-500 text-sm">由你角度出發 · 一目了然認清關係</p>
                    <p class="text-slate-400 text-xs mt-0.5">by Kowloon Creation CHANNAL</p>
                </div>
            </div>
            
            <!-- 自己資料卡（主角） -->
            <div onclick="editPerson(0)" class="flex items-center gap-x-2 bg-emerald-100 hover:bg-emerald-200 transition-colors rounded-2xl px-4 py-2 cursor-pointer">
                <span class="text-2xl">👑</span>
                <div>
                    <div id="my-name-display" class="font-semibold">我</div>
                    <div id="my-age-zodiac" class="text-xs text-slate-500"></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- 左側：關係圖 -->
            <div class="lg:col-span-7 bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-semibold flex items-center gap-x-2">
                        👥 關係圖
                        <span class="text-emerald-500 text-sm font-normal bg-emerald-100 px-3 py-0.5 rounded-3xl">互動拖拉 • 放大縮小 • 點擊編輯 • 長按連線</span>
                    </h2>
                    <div class="text-xs text-slate-400 flex items-center gap-x-1">
                        <div class="w-3 h-3 bg-blue-500 rounded-full"></div> 男
                        <div class="w-3 h-3 bg-pink-500 rounded-full"></div> 女
                        <span class="ml-2">點擊節點編輯 • <span class="mobile-hint">長按 / 右鍵節點管理連線（新增或取消）</span></span>
                    </div>
                </div>
                <div id="mynetwork" class="shadow-inner"></div>
            </div>

            <!-- 右側：全部人物列表 -->
            <div class="lg:col-span-5 bg-white rounded-3xl shadow-sm border border-slate-200 p-6 flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-semibold">📋 全部人物列表</h2>
                    <button onclick="showAddModal()"
                            class="flex items-center gap-x-2 bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-2xl font-medium text-sm">
                        <span class="text-xl leading-none">+</span>
                        新增親戚
                    </button>
                </div>

                <!-- 列表 -->
                <div class="flex-1 overflow-auto" id="relatives-list">
                    <!-- JS 動態生成 -->
                </div>

                <!-- 按鈕區域 -->
                <div class="mt-6 pt-6 border-t border-slate-200 flex flex-wrap items-center gap-3">
                    <button onclick="shareImage()" 
                            class="flex-1 sm:flex-none flex items-center justify-center gap-x-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-2xl font-medium text-sm transition-colors">
                        <span class="text-lg">🔗</span>
                        分享
                    </button>
                    <button onclick="exportData()" 
                            class="flex-1 sm:flex-none flex items-center justify-center gap-x-2 bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-3 rounded-2xl font-medium text-sm transition-colors">
                        <span class="text-lg">📤</span>
                        匯出 JSON
                    </button>
                    <label onclick="document.getElementById('import-input').click()"
                           class="flex-1 sm:flex-none flex items-center justify-center gap-x-2 bg-slate-700 hover:bg-slate-800 text-white px-5 py-3 rounded-2xl font-medium text-sm transition-colors cursor-pointer">
                        <span class="text-lg">📥</span>
                        匯入 JSON
                        <input id="import-input" type="file" accept=".json" class="hidden" onchange="importData(event)">
                    </label>
                    <button onclick="loadDefaultPersons()" 
                            class="flex-1 sm:flex-none flex items-center justify-center gap-x-2 bg-amber-500 hover:bg-amber-600 text-white px-5 py-3 rounded-2xl font-medium text-sm transition-colors">
                        <span class="text-lg">📋</span>
                        預設人物
                    </button>
                    <button onclick="clearAllData()" 
                            class="flex-1 sm:flex-none text-red-500 hover:text-red-600 hover:bg-red-50 px-5 py-3 rounded-2xl font-medium text-sm transition-colors flex items-center justify-center gap-x-1">
                        <span>🗑️</span> 清空全部
                    </button>
                    <button onclick="showGoldModal()" 
                            class="flex-1 sm:flex-none text-amber-500 hover:text-amber-600 hover:bg-amber-50 px-5 py-3 rounded-2xl font-medium text-sm transition-colors flex items-center justify-center gap-x-1 border border-amber-200">
                        <span>💰</span> 金主模式
                    </button>
                </div>

                <div class="text-xs text-slate-400 mt-4 text-center">
                    資料自動儲存到瀏覽器<br>
                    下次拜山、過年、飲宴依然有齊全部人物 + 連線
                </div>
            </div>
        </div>
    </div>

    <!-- 新增/編輯人物 Modal（更緊密 + 可捲動） -->
    <div id="modal" onclick="if(event.target.id==='modal')hideModal()" 
         class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" 
             class="modal bg-white w-full max-w-lg mx-4 rounded-3xl shadow-2xl modal-content">
            <div class="p-6">
                <h3 id="modal-title" class="text-2xl font-bold mb-5">新增親戚</h3>
                
                <div class="space-y-4">   <!-- 改成 space-y-4 更緊密 -->
                    <div>
                        <label class="block text-sm font-medium mb-1.5">親戚關係（由你角度）</label>
                        <select id="input-relation" 
                                class="w-full border border-slate-300 focus:border-red-400 rounded-2xl px-4 py-2.5 text-lg focus:outline-none">
                            <!-- JS 動態填入 -->
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-1.5">名字 / 稱呼</label>
                        <input id="input-name" type="text" 
                               class="w-full border border-slate-300 focus:border-red-400 rounded-2xl px-4 py-2.5 text-lg focus:outline-none"
                               placeholder="例如：阿明、表姐阿花">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1.5">性別</label>
                            <div class="flex gap-x-3">
                                <label onclick="selectGender(this)" data-value="男"
                                       class="gender-option flex-1 flex items-center justify-center gap-x-2 border-2 border-transparent bg-slate-100 hover:bg-blue-100 rounded-2xl py-3 cursor-pointer">
                                    👦 男
                                </label>
                                <label onclick="selectGender(this)" data-value="女"
                                       class="gender-option flex-1 flex items-center justify-center gap-x-2 border-2 border-transparent bg-slate-100 hover:bg-pink-100 rounded-2xl py-3 cursor-pointer">
                                    👧 女
                                </label>
                            </div>
                            <input type="hidden" id="input-gender">
                        </div>

                        <div>
                            <label class="block text-sm font-medium mb-1.5">出生年份</label>
                            <input id="input-birthyear" type="number" min="1900" max="2030" 
                                   class="w-full border border-slate-300 focus:border-red-400 rounded-2xl px-4 py-2.5 text-lg focus:outline-none"
                                   placeholder="1995">
                        </div>
                    </div>

                    <!-- 出生月日時 -->
                    <div class="grid grid-cols-3 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-1.5">月</label>
                            <input id="input-month" type="number" min="1" max="12" 
                                   class="w-full border border-slate-300 focus:border-red-400 rounded-2xl px-4 py-2.5 text-lg focus:outline-none"
                                   placeholder="3">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1.5">日</label>
                            <input id="input-day" type="number" min="1" max="31" 
                                   class="w-full border border-slate-300 focus:border-red-400 rounded-2xl px-4 py-2.5 text-lg focus:outline-none"
                                   placeholder="15">
                        </div>
                        <div>
                            <label class="block text-sm font-medium mb-1.5">時</label>
                            <input id="input-hour" type="number" min="0" max="23" 
                                   class="w-full border border-slate-300 focus:border-red-400 rounded-2xl px-4 py-2.5 text-lg focus:outline-none"
                                   placeholder="14">
                        </div>
                    </div>

                    <!-- 電話 -->
                    <div>
                        <label class="block text-sm font-medium mb-1.5">電話（香港）</label>
                        <div class="flex">
                            <span class="inline-flex items-center px-4 bg-slate-100 border border-r-0 border-slate-300 rounded-l-2xl text-slate-500">+852</span>
                            <input id="input-phone" type="tel" 
                                   class="flex-1 border border-slate-300 focus:border-red-400 rounded-r-2xl px-4 py-2.5 text-lg focus:outline-none"
                                   placeholder="12345678">
                        </div>
                    </div>

                    <!-- 備註 -->
                    <div>
                        <label class="block text-sm font-medium mb-1.5">備註</label>
                        <textarea id="input-notes" rows="3"
                                  class="w-full border border-slate-300 focus:border-red-400 rounded-3xl px-4 py-2.5 focus:outline-none resize-none"
                                  placeholder="例如：喜歡打麻雀、住在屯門..."></textarea>
                    </div>
                </div>
            </div>

            <!-- 底部按鈕（固定在最底） -->
            <div class="sticky bottom-0 bg-white border-t border-slate-200 p-4 flex gap-x-3">
                <button onclick="hideModal()" 
                        class="flex-1 py-4 text-slate-500 font-medium border border-slate-300 rounded-2xl hover:bg-slate-100 transition-colors">
                    取消
                </button>
                <button onclick="savePerson()" 
                        id="save-btn"
                        class="flex-1 py-4 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-2xl transition-colors">
                    儲存
                </button>
            </div>
        </div>
    </div>

    <!-- 連線管理 Modal -->
    <div id="connect-modal" onclick="if(event.target.id==='connect-modal')hideConnectModal()" 
         class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" 
             class="modal bg-white w-full max-w-lg mx-4 rounded-3xl shadow-2xl p-8">
            <h3 id="connect-title" class="text-2xl font-bold mb-6">管理連線</h3>
            
            <div id="connect-content" class="space-y-8">
                <!-- JS 動態生成 -->
            </div>

            <div class="flex gap-x-3 mt-8">
                <button onclick="hideConnectModal()" 
                        class="flex-1 py-4 text-slate-500 font-medium border border-slate-300 rounded-2xl hover:bg-slate-100 transition-colors">
                    關閉
                </button>
            </div>
        </div>
    </div>

    <!-- 金主模式 Modal -->
    <div id="gold-modal" onclick="if(event.target.id==='gold-modal')hideGoldModal()" 
         class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" 
             class="modal bg-white w-full max-w-lg mx-4 rounded-3xl shadow-2xl p-8">
            <h3 class="text-2xl font-bold mb-6 flex items-center gap-x-3">💰 金主模式</h3>
            
            <div class="space-y-8">
                <div class="flex items-center justify-between bg-slate-50 rounded-3xl px-6 py-5">
                    <div class="text-lg font-medium">金主模式</div>
                    <div onclick="toggleGoldMode()" id="gold-toggle" 
                         class="px-8 py-2 rounded-3xl font-semibold text-sm cursor-pointer transition-all">
                    </div>
                </div>

                <div class="bg-amber-50 border border-amber-200 rounded-3xl p-6">
                    <p class="font-medium text-amber-800">課金打賞</p>
                    <p class="text-amber-700">CHANnal of Kowloon Creation</p>
                    <div class="mt-4 flex items-center gap-x-3">
                        <span class="font-mono text-xl text-amber-800">FPS</span>
                        <span id="fps-number" onclick="copyFPS()" 
                              class="font-mono bg-white px-5 py-3 rounded-2xl cursor-pointer select-all border border-amber-300 hover:border-amber-500 text-lg">
                            127097723
                        </span>
                    </div>
                    <p class="text-xs text-amber-600 mt-2">長按數字可複製</p>
                </div>

                <div class="text-sm text-slate-600 leading-relaxed">
                    回饋、意見 可以用 FPS 的備註留言。
                </div>
            </div>

            <button onclick="hideGoldModal()" 
                    class="mt-8 w-full py-4 text-slate-500 font-medium border border-slate-300 rounded-2xl hover:bg-slate-100 transition-colors">
                關閉
            </button>
        </div>
    </div>

    <script>
        // ==================== 資料結構 ====================
        let familyData = {
            myInfo: {
                id: 0,
                name: "我",
                relation: "自己",
                gender: "",
                birthYear: null,
                birthMonth: null,
                birthDay: null,
                birthHour: null,
                phone: "",
                notes: ""
            },
            relatives: [],
            connections: []
        }

        let network = null
        let nodesDataSet = null
        let edgesDataSet = null
        let currentEditId = null
        let currentSourceId = null
        let goldMode = false

        const zodiacList = ["鼠", "牛", "虎", "兔", "龍", "蛇", "馬", "羊", "猴", "雞", "狗", "豬"]
        const zodiacEmoji = ["🐭", "🐮", "🐯", "🐰", "🐲", "🐍", "🐴", "🐑", "🐒", "🐔", "🐶", "🐷"]

        const relationCategories = [
            { label: "0. 我們一家", options: ["主角", "阿爸", "阿媽", "阿哥", "細佬", "家姐", "阿妹", "老公", "老婆", "囝囝", "囡囡", "夫妻", "父子", "父女", "母子", "母女", "兄弟", "兄妹", "姐妹", "姐弟"] },
            { label: "1. 阿爸嗰邊（父系）", options: ["阿爺", "阿嫲", "伯公（兄）", "伯婆", "叔公（弟）", "叔婆", "姑婆", "姑公", "伯父", "伯娘", "阿叔", "嬸嬸", "姑姐", "姑丈", "堂兄", "堂姐", "堂弟", "堂妹", "表兄", "表姐", "表弟", "表妹"] },
            { label: "2. 阿媽嗰邊（母系）", options: ["外公（公公）", "外嫲（婆婆）", "外伯公", "外伯婆", "外叔公", "外叔婆", "姨婆", "姨公", "舅父", "舅母 / 妗母", "姨媽（大）", "姨姨（細）", "姨丈", "表兄", "表姐", "表弟", "表妹"] },
            { label: "3. 老婆/老公阿爸嗰邊（岳父/老爺系）", options: ["岳父 / 外父 / 老爺", "大舅（兄）", "大舅奶", "舅仔（弟）", "小舅奶", "大姨（姊）", "襟兄", "姨仔（妹）", "襟弟"] },
            { label: "4. 老婆阿媽嗰邊（岳母系）", options: ["岳母 / 外母 / 奶奶", "外舅父", "外舅母", "外姨媽", "外姨丈"] }
        ]

        function getRelationOptionsHTML() {
            let html = ''
            relationCategories.forEach(cat => {
                html += `<optgroup label="${cat.label}">`
                cat.options.forEach(opt => html += `<option value="${opt}">${opt}</option>`)
                html += `</optgroup>`
            })
            return html
        }

        function getZodiacEmoji(person) {
            if (!person.birthYear) return ""
            const index = (person.birthYear - 4) % 12
            return zodiacEmoji[index < 0 ? index + 12 : index]
        }

        function getCurrentYear() { return new Date().getFullYear() }

        function getAgeZodiac(person) {
            if (!person.birthYear) return "未填出生年份"
            const age = getCurrentYear() - person.birthYear
            const index = (person.birthYear - 4) % 12
            const z = zodiacList[index < 0 ? index + 12 : index]
            const e = zodiacEmoji[index < 0 ? index + 12 : index]
            return `${age}歲　${z} ${e}`
        }

        function getBirthdayString(person) {
            if (!person.birthYear) return "未填出生日期"
            let str = `${person.birthYear}年`
            if (person.birthMonth) str += `${person.birthMonth}月`
            if (person.birthDay) str += `${person.birthDay}日`
            if (person.birthHour != null) str += ` ${person.birthHour}時`
            return str
        }

        function getPersonById(id) {
            return id === 0 ? familyData.myInfo : familyData.relatives.find(p => p.id === id)
        }

        function getNode(person) {
            let color = (person.id === 0 && goldMode)
                ? { background: "#fbbf24", border: "#b45309", highlight: { background: "#f59e0b" } }
                : person.gender === "男"
                    ? { background: "#3b82f6", border: "#1e40af", highlight: { background: "#2563eb" } }
                    : person.gender === "女"
                        ? { background: "#ec4899", border: "#be185d", highlight: { background: "#db2777" } }
                        : { background: "#64748b", border: "#334155" }

            const emoji = getZodiacEmoji(person)
            const labelText = emoji ? `${person.name}\n${emoji}` : person.name

            return {
                id: person.id,
                label: labelText,
                title: `${person.relation}\n${person.name}\n${getBirthdayString(person)}\n${getAgeZodiac(person)}\n電話: ${person.phone ? '+852' + person.phone : '未填'}\n${person.notes || "無備註"}`,
                color: color,
                shape: "circle",
                size: person.id === 0 ? 45 : 35,
                font: { size: person.id === 0 ? 22 : 18, color: "#fff", bold: true }
            }
        }

        function initNetwork() {
            const container = document.getElementById("mynetwork")
            nodesDataSet = new vis.DataSet()
            edgesDataSet = new vis.DataSet()

            nodesDataSet.add(getNode(familyData.myInfo))
            familyData.relatives.forEach(p => nodesDataSet.add(getNode(p)))

            familyData.relatives.forEach(p => {
                edgesDataSet.add({ from: 0, to: p.id, label: p.relation, font: { align: "middle", size: 14 }, color: { color: "#64748b" } })
            })

            familyData.connections.forEach(c => {
                edgesDataSet.add({
                    from: c.from, to: c.to, label: c.label,
                    font: { align: "middle", size: 13, color: "#10b981" },
                    color: { color: "#10b981" },
                    smooth: { type: "curvedCW", roundness: 0.2 },
                    arrows: { to: { enabled: true, scaleFactor: 0.8 } }
                })
            })

            network = new vis.Network(container, { nodes: nodesDataSet, edges: edgesDataSet }, {
                nodes: { borderWidth: 3, shadow: true },
                edges: { smooth: { type: "continuous" }, font: { size: 14 } },
                physics: { enabled: true, barnesHut: { gravitationalConstant: -8000, centralGravity: 0.3 } },
                interaction: { dragNodes: true, zoomView: true, hover: true, dragView: true }
            })

            network.on("click", e => e.nodes.length && editPerson(e.nodes[0]))

            // 右鍵 / 長按
            const handleContext = e => {
                e.preventDefault()
                const pos = { x: e.offsetX || (e.touches && e.touches[0].clientX - container.getBoundingClientRect().left), y: e.offsetY || (e.touches && e.touches[0].clientY - container.getBoundingClientRect().top) }
                const nodeId = network.getNodeAt(pos)
                if (nodeId != null) showConnectionModal(nodeId)
            }
            container.addEventListener("contextmenu", handleContext)
            container.addEventListener("touchstart", e => {
                const pos = { x: e.touches[0].clientX - container.getBoundingClientRect().left, y: e.touches[0].clientY - container.getBoundingClientRect().top }
                const nodeId = network.getNodeAt(pos)
                if (nodeId != null) {
                    setTimeout(() => showConnectionModal(nodeId), 650)
                }
            }, { passive: true })
        }

        function updateNetwork() {
            if (!network) return
            nodesDataSet.clear(); edgesDataSet.clear()
            nodesDataSet.add(getNode(familyData.myInfo))
            familyData.relatives.forEach(p => nodesDataSet.add(getNode(p)))
            familyData.relatives.forEach(p => edgesDataSet.add({ from: 0, to: p.id, label: p.relation, font: { align: "middle", size: 14 }, color: { color: "#64748b" } }))
            familyData.connections.forEach(c => edgesDataSet.add({
                from: c.from, to: c.to, label: c.label,
                font: { align: "middle", size: 13, color: "#10b981" },
                color: { color: "#10b981" },
                smooth: { type: "curvedCW", roundness: 0.2 },
                arrows: { to: { enabled: true, scaleFactor: 0.8 } }
            }))
        }

        function renderRelativesList() {
            const container = document.getElementById("relatives-list")
            let html = `<div class="space-y-3">`

            const me = familyData.myInfo
            html += `
            <div class="flex items-center justify-between bg-emerald-50 border border-emerald-300 rounded-3xl px-5 py-4 group">
                <div class="flex items-center gap-x-4">
                    <div class="text-4xl">👑</div>
                    <div>
                        <div class="font-semibold text-lg">${me.name}</div>
                        <div class="text-red-500 text-sm">${me.relation || "自己"}</div>
                        <div class="text-emerald-600 text-xs">${getAgeZodiac(me)}</div>
                        ${me.phone ? `<div class="text-xs text-blue-600">+852 ${me.phone}</div>` : ''}
                    </div>
                    ${me.notes ? `<div class="text-xs text-slate-400 max-w-[180px] line-clamp-2">${me.notes}</div>` : ''}
                </div>
                <button onclick="editPerson(0); event.stopImmediatePropagation()" class="px-4 py-2 text-sm font-medium bg-white border border-emerald-300 rounded-2xl hover:bg-emerald-100">編輯</button>
            </div>`

            if (familyData.relatives.length === 0) {
                html += `<div class="bg-slate-50 border border-dashed border-slate-300 rounded-3xl p-8 text-center text-slate-400">仲未有其他親戚<br>按上方「新增親戚」開始記錄啦！</div>`
            } else {
                familyData.relatives.forEach(person => {
                    html += `
                    <div class="flex items-center justify-between bg-slate-50 hover:bg-white border border-slate-200 rounded-3xl px-5 py-4 group">
                        <div class="flex items-center gap-x-4">
                            <div class="text-4xl">${person.gender === "男" ? "👦" : person.gender === "女" ? "👧" : "🧍"}</div>
                            <div>
                                <div class="font-semibold text-lg">${person.name}</div>
                                <div class="text-red-500 text-sm">${person.relation}</div>
                                <div class="text-emerald-600 text-xs">${getAgeZodiac(person)}</div>
                                ${person.phone ? `<div class="text-xs text-blue-600">+852 ${person.phone}</div>` : ''}
                            </div>
                            ${person.notes ? `<div class="text-xs text-slate-400 max-w-[180px] line-clamp-2">${person.notes}</div>` : ''}
                        </div>
                        <div class="flex items-center gap-x-2 opacity-0 group-hover:opacity-100 transition-all">
                            <button onclick="editPerson(${person.id}); event.stopImmediatePropagation()" class="px-4 py-2 text-sm font-medium bg-white border border-slate-300 rounded-2xl hover:bg-slate-100">編輯</button>
                            <button onclick="deletePerson(${person.id}); event.stopImmediatePropagation()" class="px-4 py-2 text-sm font-medium text-red-500 hover:bg-red-50 rounded-2xl">刪除</button>
                        </div>
                    </div>`
                })
            }
            html += `</div>`
            container.innerHTML = html
        }

        function saveToLocalStorage() { localStorage.setItem("familyData", JSON.stringify(familyData)) }
        function loadFromLocalStorage() {
            const saved = localStorage.getItem("familyData")
            if (saved) familyData = JSON.parse(saved)
        }
        function loadGoldMode() { goldMode = localStorage.getItem("goldMode") === "true" }
        function saveGoldMode() { localStorage.setItem("goldMode", goldMode) }

        function populateRelationSelect() {
            const select = document.getElementById("input-relation")
            if (select) select.innerHTML = getRelationOptionsHTML()
        }

        function loadDefaultData() {
            familyData.myInfo = { id: 0, name: "我", relation: "自己", gender: "", birthYear: null, birthMonth: null, birthDay: null, birthHour: null, phone: "", notes: "" }
            const momId = Date.now() + 1, dadId = Date.now() + 2, grandpaId = Date.now() + 3
            familyData.relatives = [
                { id: momId, relation: "阿媽", name: "虎媽", gender: "女", birthYear: 1986, birthMonth: null, birthDay: null, birthHour: null, phone: "", notes: "" },
                { id: dadId, relation: "老豆", name: "羊爸", gender: "男", birthYear: 1979, birthMonth: null, birthDay: null, birthHour: null, phone: "", notes: "" },
                { id: grandpaId, relation: "外公", name: "公公", gender: "男", birthYear: 1960, birthMonth: null, birthDay: null, birthHour: null, phone: "", notes: "" }
            ]
            familyData.connections = [
                { from: dadId, to: momId, label: "老婆" },
                { from: grandpaId, to: momId, label: "囡囡" }
            ]
        }

        function loadDefaultPersons() {
            if (!confirm("載入預設人物？現有資料會被取代！")) return
            loadDefaultData()
            saveToLocalStorage()
            initNetwork()
            renderRelativesList()
            updateMyInfoCard()
            alert("✅ 已載入預設人物")
        }

        function showAddModal() {
            currentEditId = null
            document.getElementById("modal-title").textContent = "新增親戚"
            document.getElementById("save-btn").textContent = "儲存親戚"
            populateRelationSelect()
            document.getElementById("input-name").value = ""
            document.getElementById("input-birthyear").value = ""
            document.getElementById("input-month").value = ""
            document.getElementById("input-day").value = ""
            document.getElementById("input-hour").value = ""
            document.getElementById("input-phone").value = ""
            document.getElementById("input-notes").value = ""
            document.querySelectorAll(".gender-option").forEach(el => el.classList.remove("border-red-400", "ring-2", "ring-red-300"))
            document.getElementById("modal").classList.remove("hidden")
            document.getElementById("modal").classList.add("flex")
        }

        function hideModal() {
            document.getElementById("modal").classList.add("hidden")
            document.getElementById("modal").classList.remove("flex")
            currentEditId = null
        }

        function selectGender(el) {
            document.querySelectorAll(".gender-option").forEach(e => e.classList.remove("border-red-400", "ring-2", "ring-red-300"))
            el.classList.add("border-red-400", "ring-2", "ring-red-300")
            document.getElementById("input-gender").value = el.dataset.value
        }

        function previewAgeZodiac() {
            const input = document.getElementById("input-birthyear")
            const preview = document.getElementById("preview-age-zodiac")
            input.oninput = () => {
                if (!input.value) { preview.innerHTML = ""; return }
                preview.innerHTML = `預覽： <span class="font-semibold">${getAgeZodiac({birthYear: parseInt(input.value)})}</span>`
            }
        }

        function savePerson() {
            const relation = document.getElementById("input-relation").value.trim()
            const name = document.getElementById("input-name").value.trim()
            const gender = document.getElementById("input-gender").value
            const birthYear = document.getElementById("input-birthyear").value ? parseInt(document.getElementById("input-birthyear").value) : null
            const birthMonth = document.getElementById("input-month").value ? parseInt(document.getElementById("input-month").value) : null
            const birthDay = document.getElementById("input-day").value ? parseInt(document.getElementById("input-day").value) : null
            const birthHour = document.getElementById("input-hour").value ? parseInt(document.getElementById("input-hour").value) : null
            const phone = document.getElementById("input-phone").value.trim()
            const notes = document.getElementById("input-notes").value.trim()

            if (!relation || !name) {
                alert("請填寫「親戚關係」同「名字」呀！")
                return
            }

            const data = { relation, name, gender, birthYear, birthMonth, birthDay, birthHour, phone, notes }

            if (currentEditId === null) {
                familyData.relatives.push({ id: Date.now(), ...data })
            } else if (currentEditId === 0) {
                Object.assign(familyData.myInfo, data)
            } else {
                const p = familyData.relatives.find(x => x.id === currentEditId)
                if (p) Object.assign(p, data)
            }

            saveToLocalStorage()
            updateNetwork()
            renderRelativesList()
            updateMyInfoCard()
            hideModal()
        }

        function editPerson(id) {
            hideModal()
            const person = getPersonById(id)
            if (!person) return
            currentEditId = id
            document.getElementById("modal-title").textContent = id === 0 ? "編輯自己（主角）資料" : "編輯親戚"
            document.getElementById("save-btn").textContent = "更新資料"

            populateRelationSelect()
            document.getElementById("input-relation").value = person.relation || (id === 0 ? "自己" : "")
            document.getElementById("input-name").value = person.name
            document.getElementById("input-birthyear").value = person.birthYear || ""
            document.getElementById("input-month").value = person.birthMonth || ""
            document.getElementById("input-day").value = person.birthDay || ""
            document.getElementById("input-hour").value = person.birthHour || ""
            document.getElementById("input-phone").value = person.phone || ""
            document.getElementById("input-notes").value = person.notes || ""

            document.getElementById("input-gender").value = person.gender || ""
            document.querySelectorAll(".gender-option").forEach(el => {
                el.classList.toggle("border-red-400", "ring-2", "ring-red-300", el.dataset.value === person.gender)
            })

            document.getElementById("modal").classList.remove("hidden")
            document.getElementById("modal").classList.add("flex")
        }

        function deletePerson(id) {
            if (id === 0) return
            if (!confirm("確定刪除呢個親戚？")) return
            familyData.relatives = familyData.relatives.filter(p => p.id !== id)
            familyData.connections = familyData.connections.filter(c => c.from !== id && c.to !== id)
            saveToLocalStorage()
            updateNetwork()
            renderRelativesList()
        }

        function updateMyInfoCard() {
            document.getElementById("my-name-display").textContent = familyData.myInfo.name
            document.getElementById("my-age-zodiac").innerHTML = familyData.myInfo.birthYear 
                ? `<span class="text-emerald-600">${getAgeZodiac(familyData.myInfo)}</span>` 
                : "未填出生年份"
        }

        // 連線管理（保持不變）
        function getOtherPeopleOptions(sourceId) {
            let html = `<option value="">-- 選擇目標人物 --</option>`
            if (sourceId !== 0) html += `<option value="0">${familyData.myInfo.name} (自己 / 主角)</option>`
            familyData.relatives.forEach(p => { if (p.id !== sourceId) html += `<option value="${p.id}">${p.name} (${p.relation})</option>` })
            return html
        }

        function getConnectContentHTML(sourceId) {
            const source = getPersonById(sourceId)
            let html = `<div class="space-y-8">`
            const conns = familyData.connections.filter(c => c.from === sourceId || c.to === sourceId)
            html += `<div><label class="block text-sm font-medium mb-3 text-emerald-700">已連線的人物（點擊取消連線）</label>`
            if (conns.length) {
                html += `<div class="space-y-2">`
                conns.forEach(c => {
                    const otherId = c.from === sourceId ? c.to : c.from
                    const arrow = c.from === sourceId ? "→" : "←"
                    const other = getPersonById(otherId)
                    html += `<div class="flex items-center justify-between bg-slate-50 px-4 py-3 rounded-2xl border border-slate-200">
                        <div class="flex items-center gap-x-3"><span class="text-xl">${arrow}</span><div><span class="font-medium">${other ? other.name : "未知"}</span><span class="ml-2 text-xs text-slate-400">(${c.label})</span></div></div>
                        <button onclick="deleteConnection(${c.from},${c.to});event.stopImmediatePropagation()" class="text-red-500 text-sm font-medium px-4 py-1 rounded-xl hover:bg-red-50">取消連線</button>
                    </div>`
                })
                html += `</div>`
            } else html += `<div class="text-xs italic text-slate-400 bg-slate-50 rounded-2xl p-4">暫無連線</div>`
            html += `</div>`

            html += `<div><h4 class="text-sm font-semibold mb-4 flex items-center gap-x-2"><span class="text-emerald-500 text-xl">➕</span> 新增連線</h4><div class="space-y-6"><div><label class="block text-sm font-medium mb-2">目標人物</label><select id="connect-target" class="w-full border border-slate-300 focus:border-emerald-400 rounded-2xl px-4 py-3 text-lg focus:outline-none">${getOtherPeopleOptions(sourceId)}</select></div><div><label class="block text-sm font-medium mb-2">關係類別 + 關係</label><select id="connect-relation" class="w-full border border-slate-300 focus:border-emerald-400 rounded-2xl px-4 py-3 text-lg focus:outline-none">${getRelationOptionsHTML()}</select></div><button onclick="saveConnection()" class="w-full py-4 bg-emerald-500 hover:bg-emerald-600 text-white font-semibold rounded-2xl transition-colors flex items-center justify-center gap-x-2"><span class="text-xl">💾</span>儲存連線</button></div></div>`
            return html
        }

        function showConnectionModal(sourceId) {
            const p = getPersonById(sourceId)
            if (!p) return
            currentSourceId = sourceId
            document.getElementById("connect-title").innerHTML = `從 <span class="text-red-500 font-semibold">${p.name}</span> 管理連線`
            document.getElementById("connect-content").innerHTML = getConnectContentHTML(sourceId)
            const m = document.getElementById("connect-modal")
            m.classList.remove("hidden"); m.classList.add("flex")
        }

        function hideConnectModal() {
            const m = document.getElementById("connect-modal")
            m.classList.add("hidden"); m.classList.remove("flex")
            currentSourceId = null
        }

        function saveConnection() {
            const t = document.getElementById("connect-target").value
            const label = document.getElementById("connect-relation").value
            if (!t || !label) return alert("請選擇目標人物同關係！")
            const targetId = parseInt(t)
            const exists = familyData.connections.some(c => (c.from === currentSourceId && c.to === targetId) || (c.from === targetId && c.to === currentSourceId))
            if (exists && !confirm("呢兩個人物已經有連線，仲要新增？")) return
            familyData.connections.push({ from: currentSourceId, to: targetId, label })
            saveToLocalStorage()
            updateNetwork()
            document.getElementById("connect-content").innerHTML = getConnectContentHTML(currentSourceId)
        }

        window.deleteConnection = function(f, t) {
            familyData.connections = familyData.connections.filter(c => !(c.from === f && c.to === t))
            saveToLocalStorage()
            updateNetwork()
            if (document.getElementById("connect-modal").classList.contains("flex") && currentSourceId !== null) {
                document.getElementById("connect-content").innerHTML = getConnectContentHTML(currentSourceId)
            }
        }

        // 金主模式
        function toggleGoldMode() {
            goldMode = !goldMode
            saveGoldMode()
            updateNetwork()
            const el = document.getElementById("gold-toggle")
            if (el) {
                if (goldMode) { el.textContent = "ON"; el.className = "px-8 py-2 rounded-3xl font-semibold text-sm cursor-pointer bg-emerald-500 text-white" }
                else { el.textContent = "OFF"; el.className = "px-8 py-2 rounded-3xl font-semibold text-sm cursor-pointer bg-slate-300 text-slate-700" }
            }
        }

        function showGoldModal() {
            const m = document.getElementById("gold-modal")
            const el = document.getElementById("gold-toggle")
            if (el) {
                if (goldMode) { el.textContent = "ON"; el.className = "px-8 py-2 rounded-3xl font-semibold text-sm cursor-pointer bg-emerald-500 text-white" }
                else { el.textContent = "OFF"; el.className = "px-8 py-2 rounded-3xl font-semibold text-sm cursor-pointer bg-slate-300 text-slate-700" }
            }
            m.classList.remove("hidden"); m.classList.add("flex")
        }

        function hideGoldModal() {
            const m = document.getElementById("gold-modal")
            m.classList.add("hidden"); m.classList.remove("flex")
        }

        function copyFPS() {
            navigator.clipboard.writeText("127097723").then(() => {
                const el = document.getElementById("fps-number")
                const orig = el.innerHTML
                el.innerHTML = `✅ 已複製！`
                setTimeout(() => el.innerHTML = orig, 1800)
            })
        }

        // 分享（已修正文字 + 圖片）
        async function shareImage() {
            if (!network) return
            network.fit({ animation: { duration: 300 } })
            await new Promise(r => setTimeout(r, 500))

            const canvas = document.querySelector('#mynetwork canvas')
            if (!canvas) return alert("無法產生圖片")

            const headerH = 140
            const w = Math.max(canvas.width, 900)
            const h = canvas.height + headerH

            const shareCanvas = document.createElement('canvas')
            shareCanvas.width = w; shareCanvas.height = h
            const ctx = shareCanvas.getContext('2d')
            ctx.fillStyle = '#ffffff'
            ctx.fillRect(0, 0, w, h)

            ctx.fillStyle = '#1e2937'
            ctx.font = '700 36px "Noto Sans TC", sans-serif'
            ctx.textAlign = 'center'
            ctx.fillText('認親認戚產生器', w/2, 65)

            ctx.fillStyle = '#64748b'
            ctx.font = '500 20px "Noto Sans TC", sans-serif'
            ctx.fillText('由你角度出發 · 一目了然認清關係', w/2, 105)

            ctx.drawImage(canvas, (w - canvas.width)/2, headerH)

            shareCanvas.toBlob(async blob => {
                const file = new File([blob], "認親認戚圖.png", { type: "image/png" })
                const text = "我的家庭關係圖\nhttps://fm.kowlooncc.workers.dev"

                if (navigator.share) {
                    try {
                        await navigator.share({ files: [file], text })
                        return
                    } catch (e) {}
                }
                // 後備下載
                const url = URL.createObjectURL(blob)
                const a = document.createElement('a')
                a.href = url; a.download = "認親認戚圖.png"
                a.click()
                URL.revokeObjectURL(url)
            }, 'image/png', 0.95)
        }

        function exportData() {
            const str = JSON.stringify(familyData, null, 2)
            const blob = new Blob([str], { type: "application/json" })
            const url = URL.createObjectURL(blob)
            const a = document.createElement("a")
            a.href = url
            a.download = `認親認戚產生器_備份_${new Date().toISOString().slice(0,10)}.json`
            a.click()
            URL.revokeObjectURL(url)
        }

        function importData(e) {
            const file = e.target.files[0]
            if (!file) return
            const reader = new FileReader()
            reader.onload = ev => {
                try {
                    const imported = JSON.parse(ev.target.result)
                    if (imported.myInfo && imported.relatives) {
                        familyData = imported
                        if (!familyData.connections) familyData.connections = []
                        saveToLocalStorage()
                        initNetwork()
                        renderRelativesList()
                        updateMyInfoCard()
                        alert("✅ 匯入成功！")
                    } else alert("檔案格式唔正確呀")
                } catch { alert("匯入失敗：檔案壞咗") }
            }
            reader.readAsText(file)
        }

        function clearAllData() {
            if (confirm("確定清空所有資料（包括主角、親戚、同所有連線）？呢個動作冇得反悔！")) {
                localStorage.removeItem("familyData")
                location.reload()
            }
        }

        function initialize() {
            loadFromLocalStorage()
            loadGoldMode()
            if (familyData.relatives.length === 0) {
                loadDefaultData()
                saveToLocalStorage()
            }
            initNetwork()
            renderRelativesList()
            updateMyInfoCard()
            previewAgeZodiac()
        }

        window.onload = initialize
    </script>
</body>
</html>

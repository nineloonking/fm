<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>認親認戚產生器 · 家庭人物關係圖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
        #mynetwork {
            width: 100%;
            height: 520px;
            border: 2px solid #e5e7eb;
            border-radius: 16px;
            background: #f8fafc;
            touch-action: none;
        }
        .modal {
            animation: modalPop 0.3s ease-out;
        }
        @keyframes modalPop {
            from { transform: scale(0.95); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
        .mobile-hint {
            animation: pulse 2s infinite;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div class="max-w-7xl mx-auto px-4 py-6">
        <!-- 頂部導航 -->
        <div class="flex items-center justify-between mb-8 bg-white rounded-2xl shadow-sm border border-slate-200 px-6 py-4">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-red-500 text-white rounded-2xl flex items-center justify-center text-2xl">👪</div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">認親認戚產生器</h1>
                    <p class="text-slate-500 text-sm">由你角度出發 · 一目了然認清關係</p>
                    <p class="text-slate-400 text-xs mt-0.5">by Kowloon Creation CHANNAL</p>
                </div>
            </div>
            
            <!-- 自己資料卡（主角） -->
            <div onclick="editPerson(0)" class="flex items-center gap-x-2 bg-emerald-100 hover:bg-emerald-200 transition-colors rounded-2xl px-4 py-2 cursor-pointer">
                <span class="text-2xl">👑</span>
                <div>
                    <div id="my-name-display" class="font-semibold">我</div>
                    <div id="my-age-zodiac" class="text-xs text-slate-500"></div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- 左側：關係圖 -->
            <div class="lg:col-span-7 bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-semibold flex items-center gap-x-2">
                        👥 關係圖
                        <span class="text-emerald-500 text-sm font-normal bg-emerald-100 px-3 py-0.5 rounded-3xl">互動拖拉 • 放大縮小 • 點擊編輯 • 長按連線</span>
                    </h2>
                    <div class="text-xs text-slate-400 flex items-center gap-x-1">
                        <div class="w-3 h-3 bg-blue-500 rounded-full"></div> 男
                        <div class="w-3 h-3 bg-pink-500 rounded-full"></div> 女
                        <span class="ml-2">點擊節點編輯 • <span class="mobile-hint">長按 / 右鍵節點管理連線（新增或取消）</span></span>
                    </div>
                </div>
                <div id="mynetwork" class="shadow-inner"></div>
            </div>

            <!-- 右側：全部人物列表 -->
            <div class="lg:col-span-5 bg-white rounded-3xl shadow-sm border border-slate-200 p-6 flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-semibold">📋 全部人物列表</h2>
                    <button onclick="showAddModal()"
                            class="flex items-center gap-x-2 bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-2xl font-medium text-sm">
                        <span class="text-xl leading-none">+</span>
                        新增親戚
                    </button>
                </div>

                <!-- 列表 -->
                <div class="flex-1 overflow-auto" id="relatives-list">
                    <!-- JS 動態生成 -->
                </div>

                <!-- 按鈕區域 -->
                <div class="mt-6 pt-6 border-t border-slate-200 flex flex-wrap items-center gap-3">
                    <button onclick="shareImage()" 
                            class="flex-1 sm:flex-none flex items-center justify-center gap-x-2 bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-2xl font-medium text-sm transition-colors">
                        <span class="text-lg">🔗</span>
                        分享
                    </button>
                    <button onclick="exportData()" 
                            class="flex-1 sm:flex-none flex items-center justify-center gap-x-2 bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-3 rounded-2xl font-medium text-sm transition-colors">
                        <span class="text-lg">📤</span>
                        匯出 JSON
                    </button>
                    <label onclick="document.getElementById('import-input').click()"
                           class="flex-1 sm:flex-none flex items-center justify-center gap-x-2 bg-slate-700 hover:bg-slate-800 text-white px-5 py-3 rounded-2xl font-medium text-sm transition-colors cursor-pointer">
                        <span class="text-lg">📥</span>
                        匯入 JSON
                        <input id="import-input" type="file" accept=".json" class="hidden" onchange="importData(event)">
                    </label>
                    <button onclick="loadDefaultPersons()" 
                            class="flex-1 sm:flex-none flex items-center justify-center gap-x-2 bg-amber-500 hover:bg-amber-600 text-white px-5 py-3 rounded-2xl font-medium text-sm transition-colors">
                        <span class="text-lg">📋</span>
                        預設人物
                    </button>
                    <button onclick="clearAllData()" 
                            class="flex-1 sm:flex-none text-red-500 hover:text-red-600 hover:bg-red-50 px-5 py-3 rounded-2xl font-medium text-sm transition-colors flex items-center justify-center gap-x-1">
                        <span>🗑️</span> 清空全部
                    </button>
                    <button onclick="showGoldModal()" 
                            class="flex-1 sm:flex-none text-amber-500 hover:text-amber-600 hover:bg-amber-50 px-5 py-3 rounded-2xl font-medium text-sm transition-colors flex items-center justify-center gap-x-1 border border-amber-200">
                        <span>💰</span> 金主模式
                    </button>
                </div>

                <div class="text-xs text-slate-400 mt-4 text-center">
                    資料自動儲存到瀏覽器<br>
                    下次拜山、過年、飲宴依然有齊全部人物 + 連線
                </div>
            </div>
        </div>
    </div>

    <!-- 新增/編輯人物 Modal -->
    <div id="modal" onclick="if(event.target.id==='modal')hideModal()" 
         class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" 
             class="modal bg-white w-full max-w-lg mx-4 rounded-3xl shadow-2xl p-8">
            <h3 id="modal-title" class="text-2xl font-bold mb-6">新增親戚</h3>
            
            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-medium mb-2">親戚關係（由你角度）</label>
                    <select id="input-relation" 
                            class="w-full border border-slate-300 focus:border-red-400 rounded-2xl px-4 py-3 text-lg focus:outline-none">
                        <!-- JS 動態填入 -->
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">名字 / 稱呼</label>
                    <input id="input-name" type="text" 
                           class="w-full border border-slate-300 focus:border-red-400 rounded-2xl px-4 py-3 text-lg focus:outline-none"
                           placeholder="例如：阿明、表姐阿花">
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <!-- 性別 -->
                    <div>
                        <label class="block text-sm font-medium mb-2">性別</label>
                        <div class="flex gap-x-4">
                            <label onclick="selectGender(this)" data-value="男"
                                   class="gender-option flex-1 flex items-center justify-center gap-x-2 border-2 border-transparent bg-slate-100 hover:bg-blue-100 rounded-2xl py-4 cursor-pointer">
                                👦 男
                            </label>
                            <label onclick="selectGender(this)" data-value="女"
                                   class="gender-option flex-1 flex items-center justify-center gap-x-2 border-2 border-transparent bg-slate-100 hover:bg-pink-100 rounded-2xl py-4 cursor-pointer">
                                👧 女
                            </label>
                        </div>
                        <input type="hidden" id="input-gender">
                    </div>

                    <!-- 出生年份 -->
                    <div>
                        <label class="block text-sm font-medium mb-2">出生年份</label>
                        <input id="input-birthyear" type="number" min="1900" max="2030" 
                               class="w-full border border-slate-300 focus:border-red-400 rounded-2xl px-4 py-3 text-lg focus:outline-none"
                               placeholder="1995">
                    </div>
                </div>

                <!-- 新增：出生月日時 -->
                <div class="grid grid-cols-3 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">月</label>
                        <input id="input-month" type="number" min="1" max="12" 
                               class="w-full border border-slate-300 focus:border-red-400 rounded-2xl px-4 py-3 text-lg focus:outline-none"
                               placeholder="3">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">日</label>
                        <input id="input-day" type="number" min="1" max="31" 
                               class="w-full border border-slate-300 focus:border-red-400 rounded-2xl px-4 py-3 text-lg focus:outline-none"
                               placeholder="15">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">時</label>
                        <input id="input-hour" type="number" min="0" max="23" 
                               class="w-full border border-slate-300 focus:border-red-400 rounded-2xl px-4 py-3 text-lg focus:outline-none"
                               placeholder="14">
                    </div>
                </div>

                <!-- 電話（預設 +852） -->
                <div>
                    <label class="block text-sm font-medium mb-2">電話（香港）</label>
                    <div class="flex">
                        <span class="inline-flex items-center px-4 bg-slate-100 border border-r-0 border-slate-300 rounded-l-2xl text-slate-500">+852</span>
                        <input id="input-phone" type="tel" 
                               class="flex-1 border border-slate-300 focus:border-red-400 rounded-r-2xl px-4 py-3 text-lg focus:outline-none"
                               placeholder="12345678">
                    </div>
                </div>

                <!-- 備註 -->
                <div>
                    <label class="block text-sm font-medium mb-2">備註（任意寫資料，例如特徵）</label>
                    <textarea id="input-notes" rows="3"
                              class="w-full border border-slate-300 focus:border-red-400 rounded-3xl px-4 py-3 focus:outline-none resize-none"
                              placeholder="例如：喜歡打麻雀、住在屯門..."></textarea>
                </div>
            </div>

            <div class="flex gap-x-3 mt-8">
                <button onclick="hideModal()" 
                        class="flex-1 py-4 text-slate-500 font-medium border border-slate-300 rounded-2xl hover:bg-slate-100 transition-colors">
                    取消
                </button>
                <button onclick="savePerson()" 
                        id="save-btn"
                        class="flex-1 py-4 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-2xl transition-colors">
                    儲存
                </button>
            </div>
        </div>
    </div>

    <!-- 連線管理 Modal -->
    <div id="connect-modal" onclick="if(event.target.id==='connect-modal')hideConnectModal()" 
         class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" 
             class="modal bg-white w-full max-w-lg mx-4 rounded-3xl shadow-2xl p-8">
            <h3 id="connect-title" class="text-2xl font-bold mb-6">管理連線</h3>
            
            <div id="connect-content" class="space-y-8">
                <!-- JS 動態生成 -->
            </div>

            <div class="flex gap-x-3 mt-8">
                <button onclick="hideConnectModal()" 
                        class="flex-1 py-4 text-slate-500 font-medium border border-slate-300 rounded-2xl hover:bg-slate-100 transition-colors">
                    關閉
                </button>
            </div>
        </div>
    </div>

    <!-- 金主模式 Modal -->
    <div id="gold-modal" onclick="if(event.target.id==='gold-modal')hideGoldModal()" 
         class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center">
        <div onclick="event.stopImmediatePropagation()" 
             class="modal bg-white w-full max-w-lg mx-4 rounded-3xl shadow-2xl p-8">
            <h3 class="text-2xl font-bold mb-6 flex items-center gap-x-3">💰 金主模式</h3>
            
            <div class="space-y-8">
                <div class="flex items-center justify-between bg-slate-50 rounded-3xl px-6 py-5">
                    <div class="text-lg font-medium">金主模式</div>
                    <div onclick="toggleGoldMode()" id="gold-toggle" 
                         class="px-8 py-2 rounded-3xl font-semibold text-sm cursor-pointer transition-all">
                    </div>
                </div>

                <div class="bg-amber-50 border border-amber-200 rounded-3xl p-6">
                    <p class="font-medium text-amber-800">課金打賞</p>
                    <p class="text-amber-700">CHANnal of Kowloon Creation</p>
                    <div class="mt-4 flex items-center gap-x-3">
                        <span class="font-mono text-xl text-amber-800">FPS</span>
                        <span id="fps-number" onclick="copyFPS()" 
                              class="font-mono bg-white px-5 py-3 rounded-2xl cursor-pointer select-all border border-amber-300 hover:border-amber-500 text-lg">
                            127097723
                        </span>
                    </div>
                    <p class="text-xs text-amber-600 mt-2">長按數字可複製</p>
                </div>

                <div class="text-sm text-slate-600 leading-relaxed">
                    回饋、意見 可以用 FPS 的備註留言。
                </div>
            </div>

            <button onclick="hideGoldModal()" 
                    class="mt-8 w-full py-4 text-slate-500 font-medium border border-slate-300 rounded-2xl hover:bg-slate-100 transition-colors">
                關閉
            </button>
        </div>
    </div>

    <script>
        // ==================== 資料結構 ====================
        let familyData = {
            myInfo: {
                id: 0,
                name: "我",
                relation: "自己",
                gender: "",
                birthYear: null,
                birthMonth: null,
                birthDay: null,
                birthHour: null,
                phone: "",
                notes: ""
            },
            relatives: [],
            connections: []
        }

        let network = null
        let nodesDataSet = null
        let edgesDataSet = null
        let currentEditId = null
        let currentSourceId = null
        let goldMode = false

        // 生肖資料
        const zodiacList = ["鼠", "牛", "虎", "兔", "龍", "蛇", "馬", "羊", "猴", "雞", "狗", "豬"]
        const zodiacEmoji = ["🐭", "🐮", "🐯", "🐰", "🐲", "🐍", "🐴", "🐑", "🐒", "🐔", "🐶", "🐷"]

        // ==================== 親戚關係五類別 ====================
        const relationCategories = [
            {
                label: "0. 我們一家",
                options: ["主角", "阿爸", "阿媽", "阿哥", "細佬", "家姐", "阿妹", "老公", "老婆", "囝囝", "囡囡", "夫妻", "父子", "父女", "母子", "母女", "兄弟", "兄妹", "姐妹", "姐弟"]
            },
            {
                label: "1. 阿爸嗰邊（父系）",
                options: ["阿爺", "阿嫲", "伯公（兄）", "伯婆", "叔公（弟）", "叔婆", "姑婆", "姑公", "伯父", "伯娘", "阿叔", "嬸嬸", "姑姐", "姑丈", "堂兄", "堂姐", "堂弟", "堂妹", "表兄", "表姐", "表弟", "表妹"]
            },
            {
                label: "2. 阿媽嗰邊（母系）",
                options: ["外公（公公）", "外嫲（婆婆）", "外伯公", "外伯婆", "外叔公", "外叔婆", "姨婆", "姨公", "舅父", "舅母 / 妗母", "姨媽（大）", "姨姨（細）", "姨丈", "表兄", "表姐", "表弟", "表妹"]
            },
            {
                label: "3. 老婆/老公阿爸嗰邊（岳父/老爺系）",
                options: ["岳父 / 外父 / 老爺", "大舅（兄）", "大舅奶", "舅仔（弟）", "小舅奶", "大姨（姊）", "襟兄", "姨仔（妹）", "襟弟"]
            },
            {
                label: "4. 老婆阿媽嗰邊（岳母系）",
                options: ["岳母 / 外母 / 奶奶", "外舅父", "外舅母", "外姨媽", "外姨丈"]
            }
        ]

        function getRelationOptionsHTML() {
            let html = ''
            relationCategories.forEach(cat => {
                html += `<optgroup label="${cat.label}">`
                cat.options.forEach(opt => {
                    html += `<option value="${opt}">${opt}</option>`
                })
                html += `</optgroup>`
            })
            return html
        }

        function getZodiacEmoji(person) {
            if (!person.birthYear) return ""
            const index = (person.birthYear - 4) % 12
            const idx = index < 0 ? index + 12 : index
            return zodiacEmoji[idx]
        }

        // ==================== 工具函數 ====================
        function getCurrentYear() {
            return new Date().getFullYear()
        }

        function getAgeZodiac(person) {
            if (!person.birthYear) return "未填出生年份"
            const age = getCurrentYear() - person.birthYear
            const index = (person.birthYear - 4) % 12
            const z = zodiacList[index < 0 ? index + 12 : index]
            const e = zodiacEmoji[index < 0 ? index + 12 : index]
            return `${age}歲　${z} ${e}`
        }

        function getBirthdayString(person) {
            if (!person.birthYear) return "未填出生日期"
            let str = `${person.birthYear}年`
            if (person.birthMonth) str += `${person.birthMonth}月`
            if (person.birthDay) str += `${person.birthDay}日`
            if (person.birthHour != null) str += ` ${person.birthHour}時`
            return str
        }

        function getPersonById(id) {
            if (id === 0) return familyData.myInfo
            return familyData.relatives.find(p => p.id === id)
        }

        function getNode(person) {
            let color
            if (person.id === 0 && goldMode) {
                color = { background: "#fbbf24", border: "#b45309", highlight: { background: "#f59e0b" } }
            } else if (person.gender === "男") {
                color = { background: "#3b82f6", border: "#1e40af", highlight: { background: "#2563eb" } }
            } else if (person.gender === "女") {
                color = { background: "#ec4899", border: "#be185d", highlight: { background: "#db2777" } }
            } else {
                color = { background: "#64748b", border: "#334155" }
            }

            const emoji = getZodiacEmoji(person)
            const labelText = emoji ? `${person.name}\n${emoji}` : person.name

            return {
                id: person.id,
                label: labelText,
                title: `${person.relation}\n${person.name}\n${getBirthdayString(person)}\n${getAgeZodiac(person)}\n電話: ${person.phone ? '+852' + person.phone : '未填'}\n${person.notes || "無備註"}`,
                color: color,
                shape: "circle",
                size: person.id === 0 ? 45 : 35,
                font: { size: person.id === 0 ? 22 : 18, color: "#fff", bold: true }
            }
        }

        function initNetwork() {
            const container = document.getElementById("mynetwork")
            
            nodesDataSet = new vis.DataSet()
            edgesDataSet = new vis.DataSet()

            nodesDataSet.add(getNode(familyData.myInfo))
            familyData.relatives.forEach(person => nodesDataSet.add(getNode(person)))

            familyData.relatives.forEach(person => {
                edgesDataSet.add({
                    from: 0,
                    to: person.id,
                    label: person.relation,
                    font: { align: "middle", size: 14 },
                    color: { color: "#64748b", highlight: "#64748b" }
                })
            })

            familyData.connections.forEach(conn => {
                edgesDataSet.add({
                    from: conn.from,
                    to: conn.to,
                    label: conn.label,
                    font: { align: "middle", size: 13, color: "#10b981" },
                    color: { color: "#10b981", highlight: "#10b981" },
                    smooth: { type: "curvedCW", roundness: 0.2 },
                    arrows: { to: { enabled: true, scaleFactor: 0.8 } }
                })
            })

            const options = {
                nodes: { borderWidth: 3, shadow: true },
                edges: { smooth: { type: "continuous" }, font: { size: 14 } },
                physics: {
                    enabled: true,
                    barnesHut: { gravitationalConstant: -8000, centralGravity: 0.3 },
                    stabilization: { iterations: 100 }
                },
                interaction: { 
                    dragNodes: true, 
                    zoomView: true, 
                    hover: true,
                    dragView: true
                }
            }

            network = new vis.Network(container, { nodes: nodesDataSet, edges: edgesDataSet }, options)

            network.on("click", function (params) {
                if (params.nodes.length > 0) {
                    editPerson(params.nodes[0])
                }
            })

            container.addEventListener("contextmenu", function (e) {
                e.preventDefault()
                const nodeId = network.getNodeAt({ x: e.offsetX, y: e.offsetY })
                if (nodeId !== undefined && nodeId !== null) {
                    showConnectionModal(nodeId)
                }
            })

            let longPressTimer = null
            const LONG_PRESS_DURATION = 650

            function getPointerPosition(e) {
                const rect = container.getBoundingClientRect()
                const clientX = e.clientX || (e.touches && e.touches[0] ? e.touches[0].clientX : 0)
                const clientY = e.clientY || (e.touches && e.touches[0] ? e.touches[0].clientY : 0)
                return { x: clientX - rect.left, y: clientY - rect.top }
            }

            container.addEventListener("touchstart", function (e) {
                const pos = getPointerPosition(e)
                const nodeId = network.getNodeAt(pos)
                if (nodeId !== undefined && nodeId !== null) {
                    longPressTimer = setTimeout(() => {
                        showConnectionModal(nodeId)
                    }, LONG_PRESS_DURATION)
                }
            }, { passive: true })

            function cancelLongPress() {
                if (longPressTimer) {
                    clearTimeout(longPressTimer)
                    longPressTimer = null
                }
            }
            container.addEventListener("touchend", cancelLongPress, { passive: true })
            container.addEventListener("touchmove", cancelLongPress, { passive: true })
        }

        function updateNetwork() {
            if (!network) return
            nodesDataSet.clear()
            edgesDataSet.clear()

            nodesDataSet.add(getNode(familyData.myInfo))
            familyData.relatives.forEach(person => nodesDataSet.add(getNode(person)))

            familyData.relatives.forEach(person => {
                edgesDataSet.add({
                    from: 0,
                    to: person.id,
                    label: person.relation,
                    font: { align: "middle", size: 14 },

        function savePerson() {
            const relation = document.getElementById("input-relation").value.trim()
            const name = document.getElementById("input-name").value.trim()
            const gender = document.getElementById("input-gender").value
            const birthYear = document.getElementById("input-birthyear").value ? parseInt(document.getElementById("input-birthyear").value) : null
            const birthMonth = document.getElementById("input-month").value ? parseInt(document.getElementById("input-month").value) : null
            const birthDay = document.getElementById("input-day").value ? parseInt(document.getElementById("input-day").value) : null
            const birthHour = document.getElementById("input-hour").value ? parseInt(document.getElementById("input-hour").value) : null
            const phone = document.getElementById("input-phone").value.trim()
            const notes = document.getElementById("input-notes").value.trim()

            if (!relation || !name) {
                alert("請填寫「親戚關係」同「名字」呀！")
                return
            }

            const newData = {
                relation: relation,
                name: name,
                gender: gender,
                birthYear: birthYear,
                birthMonth: birthMonth,
                birthDay: birthDay,
                birthHour: birthHour,
                phone: phone,
                notes: notes
            }

            if (currentEditId === null) {
                familyData.relatives.push({
                    id: Date.now(),
                    ...newData
                })
            } else if (currentEditId === 0) {
                familyData.myInfo = { ...familyData.myInfo, ...newData }
            } else {
                const person = familyData.relatives.find(p => p.id === currentEditId)
                if (person) Object.assign(person, newData)
            }

            saveToLocalStorage()
            updateNetwork()
            renderRelativesList()
            updateMyInfoCard()
            hideModal()
        }

        function editPerson(id) {
            hideModal()
            const person = getPersonById(id)
            if (!person) return

            currentEditId = id
            document.getElementById("modal-title").textContent = (id === 0) ? "編輯自己（主角）資料" : "編輯親戚"
            document.getElementById("save-btn").textContent = "更新資料"

            populateRelationSelect()
            document.getElementById("input-relation").value = person.relation || (id === 0 ? "自己" : "")
            document.getElementById("input-name").value = person.name
            document.getElementById("input-birthyear").value = person.birthYear || ""
            document.getElementById("input-month").value = person.birthMonth || ""
            document.getElementById("input-day").value = person.birthDay || ""
            document.getElementById("input-hour").value = person.birthHour || ""
            document.getElementById("input-phone").value = person.phone || ""
            document.getElementById("input-notes").value = person.notes || ""

            document.getElementById("input-gender").value = person.gender || ""
            document.querySelectorAll(".gender-option").forEach(el => {
                if (el.dataset.value === person.gender) {
                    el.classList.add("border-red-400", "ring-2", "ring-red-300")
                } else {
                    el.classList.remove("border-red-400", "ring-2", "ring-red-300")
                }
            })

            document.getElementById("modal").classList.remove("hidden")
            document.getElementById("modal").classList.add("flex")
        }

        function deletePerson(id) {
            if (id === 0) return
            if (!confirm("確定刪除呢個親戚？")) return
            familyData.relatives = familyData.relatives.filter(p => p.id !== id)
            familyData.connections = familyData.connections.filter(c => c.from !== id && c.to !== id)
            saveToLocalStorage()
            updateNetwork()
            renderRelativesList()
        }

        function updateMyInfoCard() {
            document.getElementById("my-name-display").textContent = familyData.myInfo.name
            document.getElementById("my-age-zodiac").innerHTML = familyData.myInfo.birthYear 
                ? `<span class="text-emerald-600">${getAgeZodiac(familyData.myInfo)}</span>` 
                : "未填出生年份"
        }

        // ==================== 連線管理 ====================
        function getOtherPeopleOptions(sourceId) {
            let html = `<option value="">-- 選擇目標人物 --</option>`
            if (sourceId !== 0) html += `<option value="0">${familyData.myInfo.name} (自己 / 主角)</option>`
            familyData.relatives.forEach(p => {
                if (p.id !== sourceId) {
                    html += `<option value="${p.id}">${p.name} (${p.relation})</option>`
                }
            })
            return html
        }

        function getConnectContentHTML(sourceId) {
            const sourcePerson = getPersonById(sourceId)
            let html = `<div class="space-y-8">`

            const relatedConns = familyData.connections.filter(c => c.from === sourceId || c.to === sourceId)
            html += `<div>`
            html += `<label class="block text-sm font-medium mb-3 text-emerald-700">已連線的人物（點擊取消連線）</label>`
            
            if (relatedConns.length > 0) {
                html += `<div class="space-y-2">`
                relatedConns.forEach(conn => {
                    let otherId, arrow
                    if (conn.from === sourceId) {
                        otherId = conn.to
                        arrow = "→"
                    } else {
                        otherId = conn.from
                        arrow = "←"
                    }
                    const other = getPersonById(otherId)
                    const otherName = other ? other.name : "未知"
                    html += `
                    <div class="flex items-center justify-between bg-slate-50 px-4 py-3 rounded-2xl border border-slate-200">
                        <div class="flex items-center gap-x-3">
                            <span class="text-xl">${arrow}</span>
                            <div>
                                <span class="font-medium">${otherName}</span>
                                <span class="ml-2 text-xs text-slate-400">(${conn.label})</span>
                            </div>
                        </div>
                        <button onclick="deleteConnection(${conn.from}, ${conn.to}); event.stopImmediatePropagation()"

                    </div>`

                html += `</div>`

                html += `<div class="text-xs italic text-slate-400 bg-slate-50 rounded-2xl p-4">暫無連線</div>`

            html += `

                <div class="space-y-6">

                        <span class="text-xl">💾</span>
                        儲存連線
                    </button>
                </div>
            </div>`

            html += `</div>`
            return html
        }

        function showConnectionModal(sourceId) {
            const sourcePerson = getPersonById(sourceId)
            if (!sourcePerson) return

            currentSourceId = sourceId
            document.getElementById("connect-title").innerHTML = `從 <span class="text-red-500 font-semibold">${sourcePerson.name}</span> 管理連線`

            document.getElementById("connect-content").innerHTML = getConnectContentHTML(sourceId)

        function hideConnectModal() {
            const modal = document.getElementById("connect-modal")

        function saveConnection() {
            const targetIdStr = document.getElementById("connect-target").value
            const label = document.getElementById("connect-relation").value

            if (!targetIdStr || !label) {
                alert("請選擇目標人物同關係！")
                return
            }

            const targetId = parseInt(targetIdStr)

            const exists = familyData.connections.some(c => 
                (c.from === currentSourceId && c.to === targetId) || 
                (c.from === targetId && c.to === currentSourceId)
            )
            if (exists) {
                if (!confirm("呢兩個人物已經有連線，仲要新增？")) return
            }

            familyData.connections.push({
                from: currentSourceId,
                to: targetId,
                label: label
            })

            saveToLocalStorage()
            updateNetwork()
            document.getElementById("connect-content").innerHTML = getConnectContentHTML(currentSourceId)
        }

        window.deleteConnection = function (fromId, toId) {
            familyData.connections = familyData.connections.filter(c => !(c.from === fromId && c.to === toId))
            saveToLocalStorage()
            updateNetwork()
            if (document.getElementById("connect-modal").classList.contains("flex") && currentSourceId !== null) {
                document.getElementById("connect-content").innerHTML = getConnectContentHTML(currentSourceId)
            }
        }

        // ==================== 分享功能 ====================
        async function shareImage() {
            if (!network) return
            network.fit({ animation: { duration: 300 } })
            await new Promise(resolve => setTimeout(resolve, 500))

            const networkCanvas = document.querySelector('#mynetwork canvas')
            if (!networkCanvas) {
                alert("無法產生圖片，請稍後再試")
                return
            }

            const headerHeight = 140
            const totalWidth = Math.max(networkCanvas.width, 900)
            const totalHeight = networkCanvas.height + headerHeight

            const shareCanvas = document.createElement('canvas')
            shareCanvas.width = totalWidth
            shareCanvas.height = totalHeight
            const ctx = shareCanvas.getContext('2d')

            ctx.fillStyle = '#ffffff'
            ctx.fillRect(0, 0, totalWidth, totalHeight)

            ctx.fillStyle = '#1e2937'
            ctx.font = '700 36px "Noto Sans TC", sans-serif'
            ctx.textAlign = 'center'
            ctx.fillText('認親認戚產生器', totalWidth / 2, 65)

            ctx.fillStyle = '#64748b'
            ctx.font = '500 20px "Noto Sans TC", sans-serif'
            ctx.fillText('由你角度出發 · 一目了然認清關係', totalWidth / 2, 105)

            const networkX = (totalWidth - networkCanvas.width) / 2
            ctx.drawImage(networkCanvas, networkX, headerHeight)

            shareCanvas.toBlob(async (blob) => {
                const file = new File([blob], '認親認戚圖.png', { type: 'image/png' })

                if (navigator.share && navigator.canShare({ files: [file] })) {
                    try {
                        await navigator.share({
                            files: [file],
                            title: '我的家庭關係圖',
                            text: '認親認戚產生器\nhttps://fm.kowlooncc.workers.dev'
                        })
                        return
                    } catch (e) {}
                }

                const url = URL.createObjectURL(blob)
                const a = document.createElement('a')
                a.href = url
                a.download = '認親認戚圖.png'
                a.click()
                URL.revokeObjectURL(url)
            }, 'image/png', 0.95)
        }

        // ==================== 匯出 / 匯入 / 清空 ====================
        function exportData() {
            const dataStr = JSON.stringify(familyData, null, 2)
            const blob = new Blob([dataStr], { type: "application/json" })
            const url = URL.createObjectURL(blob)
            const link = document.createElement("a")
            link.href = url
            link.download = `認親認戚產生器_備份_${new Date().toISOString().slice(0,10)}.json`
            link.click()
            URL.revokeObjectURL(url)
        }

        function importData(e) {
            const file = e.target.files[0]
            if (!file) return
            const reader = new FileReader()
            reader.onload = function (event) {
                try {
                    const imported = JSON.parse(event.target.result)
                    if (imported.myInfo && imported.relatives !== undefined) {
                        familyData = imported
                        if (!familyData.connections) familyData.connections = []
                        saveToLocalStorage()
                        initNetwork()
                        renderRelativesList()
                        updateMyInfoCard()
                        alert("✅ 匯入成功！全部人物同連線已經更新")
                    } else {
                        alert("檔案格式唔正確呀")
                    }
                } catch (err) {
                    alert("匯入失敗：檔案壞咗")
                }
            }
            reader.readAsText(file)
        }

        function clearAllData() {
            if (confirm("確定清空所有資料（包括主角、親戚、同所有連線）？呢個動作冇得反悔！")) {
                localStorage.removeItem("familyData")
                location.reload()
            }
        }

        // ==================== 啟動 ====================
        function initialize() {
            loadFromLocalStorage()
            loadGoldMode()

            // 新使用時自動載入預設人物
            if (familyData.relatives.length === 0) {
                loadDefaultData()
                saveToLocalStorage()
            }

            initNetwork()
            renderRelativesList()
            updateMyInfoCard()
            previewAgeZodiac()

            return {
                config(userConfig = {}) {
                    return {
                        content: [],
                        theme: { extend: {} },
                        plugins: [],
                        ...userConfig,
                    }
                },
                theme: { extend: {} },
            }
        }

        window.onload = initialize
    </script>

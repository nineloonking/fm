<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拜山關係圖 · 家庭人物關係圖</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
        #mynetwork { width: 100%; height: 550px; border: 2px solid #e5e7eb; border-radius: 16px; background: #f8fafc; }
        .modal { animation: modalPop 0.3s ease-out; }
        @keyframes modalPop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .context-menu {
            position: absolute;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            z-index: 100;
            padding: 6px 0;
            min-width: 160px;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div class="max-w-7xl mx-auto px-4 py-6">
        <div class="flex items-center justify-between mb-8 bg-white rounded-2xl shadow-sm border border-slate-200 px-6 py-4">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-red-500 text-white rounded-2xl flex items-center justify-center text-2xl">👪</div>
                <div>
                    <h1 class="text-3xl font-bold tracking-tight">拜山關係圖</h1>
                    <p class="text-slate-500 text-sm">由你角度出發 · 五大類親戚 · 右鍵操作</p>
                </div>
            </div>
            
            <div class="flex items-center gap-x-4">
                <div onclick="editMyInfo()" class="flex items-center gap-x-2 bg-slate-100 hover:bg-slate-200 transition-colors rounded-2xl px-4 py-2 cursor-pointer">
                    <span class="text-2xl">🧍‍♂️</span>
                    <div>
                        <div id="my-name-display" class="font-semibold">我</div>
                        <div id="my-age-zodiac" class="text-xs text-slate-500"></div>
                    </div>
                </div>

                <button onclick="exportData()" class="flex items-center gap-x-2 bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-2xl font-medium text-sm transition-colors">
                    📤 匯出 JSON
                </button>
                <label onclick="document.getElementById('import-input').click()" class="flex items-center gap-x-2 bg-slate-700 hover:bg-slate-800 text-white px-5 py-2.5 rounded-2xl font-medium text-sm transition-colors cursor-pointer">
                    📥 匯入 JSON
                    <input id="import-input" type="file" accept=".json" class="hidden" onchange="importData(event)">
                </label>

                <button onclick="clearAllData()" class="text-red-500 hover:text-red-600 flex items-center gap-x-1 text-sm font-medium">
                    🗑️ 清空全部
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- 關係圖 -->
            <div class="lg:col-span-7 bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-semibold">👥 人物關係圖（右鍵操作）</h2>
                </div>
                <div id="mynetwork"></div>
            </div>

            <!-- 親戚列表 -->
            <div class="lg:col-span-5 bg-white rounded-3xl shadow-sm border border-slate-200 p-6 flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-semibold">📋 親戚列表</h2>
                    <button onclick="showAddModal()" class="flex items-center gap-x-2 bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-2xl font-medium text-sm">
                        <span class="text-xl">+</span> 新增親戚
                    </button>
                </div>
                <div class="flex-1 overflow-auto" id="relatives-list"></div>
            </div>
        </div>
    </div>

    <!-- 新增/編輯 Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="modal bg-white w-full max-w-lg mx-4 rounded-3xl shadow-2xl p-8">
            <h3 id="modal-title" class="text-2xl font-bold mb-6">新增親戚</h3>
            
            <div class="space-y-6">
                <!-- 關係類別 -->
                <div>
                    <label class="block text-sm font-medium mb-2">關係類別</label>
                    <select id="input-category" onchange="updateRelationSuggestions()" 
                            class="w-full border border-slate-300 focus:border-red-400 rounded-2xl px-4 py-3 text-lg focus:outline-none">
                        <option value="0">0. 我們一家</option>
                        <option value="1">1. 阿爸嗰邊（父系）</option>
                        <option value="2">2. 阿媽嗰邊（母系）</option>
                        <option value="3">3. 老婆/老公阿爸嗰邊（岳父系）</option>
                        <option value="4">4. 老婆阿媽嗰邊（岳母系）</option>
                    </select>
                </div>

                <!-- 具體關係 -->
                <div>
                    <label class="block text-sm font-medium mb-2">具體稱呼（由你角度）</label>
                    <input id="input-relation" type="text" list="relation-suggestions"
                           class="w-full border border-slate-300 focus:border-red-400 rounded-2xl px-4 py-3 text-lg focus:outline-none"
                           placeholder="例如：阿爸、堂哥、舅父...">
                    <datalist id="relation-suggestions"></datalist>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">名字 / 稱呼</label>
                        <input id="input-name" type="text" 
                               class="w-full border border-slate-300 focus:border-red-400 rounded-2xl px-4 py-3 text-lg focus:outline-none"
                               placeholder="例如：阿明、表姐阿花">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">出生年份</label>
                        <input id="input-birthyear" type="number" min="1900" max="2030" 
                               class="w-full border border-slate-300 focus:border-red-400 rounded-2xl px-4 py-3 text-lg focus:outline-none"
                               placeholder="1995">
                        <div id="preview-age-zodiac" class="mt-2 text-emerald-600 text-sm font-medium"></div>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">性別</label>
                    <div class="flex gap-x-4">
                        <label onclick="selectGender(this)" data-value="男" class="gender-option flex-1 flex items-center justify-center gap-x-2 border-2 border-transparent bg-slate-100 hover:bg-blue-100 rounded-2xl py-4 cursor-pointer">👦 男</label>
                        <label onclick="selectGender(this)" data-value="女" class="gender-option flex-1 flex items-center justify-center gap-x-2 border-2 border-transparent bg-slate-100 hover:bg-pink-100 rounded-2xl py-4 cursor-pointer">👧 女</label>
                    </div>
                    <input type="hidden" id="input-gender">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">備註</label>
                    <textarea id="input-notes" rows="3" class="w-full border border-slate-300 focus:border-red-400 rounded-3xl px-4 py-3 focus:outline-none resize-none" placeholder="電話、特徵、住邊度..."></textarea>
                </div>
            </div>

            <div class="flex gap-x-3 mt-8">
                <button onclick="hideModal()" class="flex-1 py-4 text-slate-500 font-medium border border-slate-300 rounded-2xl hover:bg-slate-100">取消</button>
                <button onclick="savePerson()" id="save-btn" class="flex-1 py-4 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-2xl">儲存親戚</button>
            </div>
        </div>
    </div>

    <!-- 右鍵選單 -->
    <div id="context-menu" class="context-menu hidden"></div>

    <script>
        // ==================== 資料 ====================
        let familyData = {
            myInfo: { id: 0, name: "我", relation: "自己", gender: "", birthYear: null, notes: "", category: "0" },
            relatives: []   // {id, category, relation, name, gender, birthYear, notes}
        }

        let network = null
        let nodesDataSet = null
        let edgesDataSet = null
        let currentEditId = null
        let contextNodeId = null
        let contextEdgeId = null

        const zodiacList = ["鼠","牛","虎","兔","龍","蛇","馬","羊","猴","雞","狗","豬"]
        const zodiacEmoji = ["🐭","🐮","🐯","🐰","🐲","🐍","🐴","🐑","🐒","🐔","🐶","🐷"]

        // 五大類別 + 建議稱呼
        const categories = {
            "0": ["主角", "阿爸", "阿媽", "阿哥", "細佬", "家姐", "阿妹", "老公", "老婆", "仔仔", "女女"],
            "1": ["阿爺", "阿嫲", "伯公", "伯婆", "叔公", "叔婆", "姑婆", "姑公", "伯父", "伯娘", "阿叔", "嬸嬸", "姑姐", "姑丈", "堂兄", "堂姐", "堂弟", "堂妹", "表兄", "表姐", "表弟", "表妹"],
            "2": ["外公", "外嫲", "外伯公", "外伯婆", "外叔公", "外叔婆", "姨婆", "姨公", "舅父", "舅母", "姨媽", "阿姨", "姨丈", "表兄", "表姐", "表弟", "表妹"],
            "3": ["岳父", "外父", "老爺", "大舅", "大舅奶", "舅仔", "小舅奶", "大姨", "襟兄", "姨仔", "襟弟"],
            "4": ["岳母", "外母", "奶奶", "外舅父", "外舅母", "外姨媽", "外姨丈"]
        }

        function getCurrentYear() { return new Date().getFullYear() }

        function getAgeZodiac(person) {
            if (!person.birthYear) return "未填出生年份"
            const age = getCurrentYear() - person.birthYear
            const idx = (person.birthYear - 4) % 12
            const z = zodiacList[idx < 0 ? idx + 12 : idx]
            const e = zodiacEmoji[idx < 0 ? idx + 12 : idx]
            return `${age}歲　${z}${e}`
        }

        function getNodeColor(gender) {
            if (gender === "男") return { background: "#3b82f6", border: "#1e40af" }
            if (gender === "女") return { background: "#ec4899", border: "#be185d" }
            return { background: "#64748b", border: "#334155" }
        }

        function getNode(person) {
            const color = getNodeColor(person.gender)
            return {
                id: person.id,
                label: person.name,
                title: `<b>${person.relation}</b><br>${person.name}<br>${getAgeZodiac(person)}<br><small>${person.notes || ""}</small>`,
                color: { background: color.background, border: color.border, highlight: { background: color.background } },
                shape: "circle",
                size: person.id === 0 ? 48 : 36,
                font: { size: person.id === 0 ? 22 : 18, color: "#fff", bold: true }
            }
        }

        function initNetwork() {
            const container = document.getElementById("mynetwork")
            nodesDataSet = new vis.DataSet()
            edgesDataSet = new vis.DataSet()

            nodesDataSet.add(getNode(familyData.myInfo))

            familyData.relatives.forEach(p => {
                nodesDataSet.add(getNode(p))
                // 預設連線
                edgesDataSet.add({ id: `e${familyData.myInfo.id}-${p.id}`, from: 0, to: p.id, label: p.relation, font: {align: "middle", size: 13}, color: {color: "#64748b"} })
            })

            const options = {
                nodes: { borderWidth: 3, shadow: true },
                edges: { smooth: {type: "continuous"}, font: {size: 13} },
                physics: { barnesHut: { gravitationalConstant: -8000, centralGravity: 0.3 } },
                interaction: { dragNodes: true, zoomView: true, hover: true }
            }

            network = new vis.Network(container, { nodes: nodesDataSet, edges: edgesDataSet }, options)

            // 點擊編輯
            network.on("click", params => {
                if (params.nodes.length) {
                    const id = params.nodes[0]
                    if (id === 0) editMyInfo()
                    else editPerson(id)
                }
            })

            // 右鍵選單
            network.on("oncontext", params => {
                params.event.preventDefault()
                const menu = document.getElementById("context-menu")
                menu.innerHTML = ""
                menu.style.left = params.event.pageX + "px"
                menu.style.top = params.event.pageY + "px"
                menu.classList.remove("hidden")

                const nodeIds = network.getNodeAt(params.pointer.DOM)
                const edgeIds = network.getEdgeAt(params.pointer.DOM)

                if (nodeIds !== undefined) {
                    contextNodeId = nodeIds
                    contextEdgeId = null
                    if (nodeIds === 0) {
                        menu.innerHTML = `<div class="px-4 py-2 hover:bg-slate-100 cursor-pointer" onclick="editMyInfo();hideContext()">編輯自己資料</div>`
                    } else {
                        menu.innerHTML = `
                            <div class="px-4 py-2 hover:bg-slate-100 cursor-pointer" onclick="editPerson(${nodeIds});hideContext()">編輯</div>
                            <div class="px-4 py-2 hover:bg-slate-100 cursor-pointer" onclick="deletePerson(${nodeIds});hideContext()">刪除</div>
                            <div class="px-4 py-2 hover:bg-slate-100 cursor-pointer" onclick="showConnectMenu(${nodeIds});hideContext()">手動連線到...</div>
                            <div class="px-4 py-2 hover:bg-slate-100 cursor-pointer text-red-500" onclick="removeEdgeToNode(${nodeIds});hideContext()">取消所有連線</div>
                        `
                    }
                } else if (edgeIds !== undefined) {
                    contextEdgeId = edgeIds
                    contextNodeId = null
                    menu.innerHTML = `<div class="px-4 py-2 hover:bg-slate-100 cursor-pointer text-red-500" onclick="deleteEdge('${edgeIds}');hideContext()">刪除此連線</div>`
                }
            })

            document.addEventListener("click", () => hideContext())
        }

        function hideContext() {
            document.getElementById("context-menu").classList.add("hidden")
        }

        function showConnectMenu(targetId) {
            let html = `<div class="px-4 py-2 font-medium text-slate-500">連線到：</div>`
            html += `<div class="px-4 py-2 hover:bg-slate-100 cursor-pointer" onclick="connectTo(0, ${targetId});hideContext()">我（主角）</div>`
            
            familyData.relatives.forEach(p => {
                if (p.id !== targetId) {
                    html += `<div class="px-4 py-2 hover:bg-slate-100 cursor-pointer" onclick="connectTo(${p.id}, ${targetId});hideContext()">${p.name} (${p.relation})</div>`
                }
            })
            document.getElementById("context-menu").innerHTML = html
        }

        function connectTo(fromId, toId) {
            const edgeId = `e${fromId}-${toId}`
            if (!edgesDataSet.get(edgeId)) {
                const person = fromId === 0 ? familyData.myInfo : familyData.relatives.find(p => p.id === fromId)
                edgesDataSet.add({
                    id: edgeId,
                    from: fromId,
                    to: toId,
                    label: person ? person.relation : "",
                    font: {align: "middle", size: 13}
                })
            }
        }

        function removeEdgeToNode(nodeId) {
            const edgesToRemove = edgesDataSet.get().filter(e => e.from === 0 && e.to === nodeId || e.from === nodeId && e.to === 0)
            edgesToRemove.forEach(e => edgesDataSet.remove(e.id))
        }

        function deleteEdge(edgeId) {
            edgesDataSet.remove(edgeId)
        }

        function updateNetwork() {
            if (!network) return
            nodesDataSet.clear()
            edgesDataSet.clear()

            nodesDataSet.add(getNode(familyData.myInfo))

            familyData.relatives.forEach(p => {
                nodesDataSet.add(getNode(p))
                // 預設連線到主角
                edgesDataSet.add({
                    id: `e0-${p.id}`,
                    from: 0,
                    to: p.id,
                    label: p.relation,
                    font: {align: "middle", size: 13},
                    color: {color: "#64748b"}
                })
            })
        }

        function renderRelativesList() {
            const container = document.getElementById("relatives-list")
            let html = `<div class="space-y-3">`
            
            if (familyData.relatives.length === 0) {
                html += `<div class="bg-slate-50 border border-dashed border-slate-300 rounded-3xl p-8 text-center text-slate-400">未有親戚<br>按「新增親戚」開始</div>`
            } else {
                familyData.relatives.forEach(p => {
                    html += `
                    <div class="bg-slate-50 hover:bg-white border border-slate-200 rounded-3xl px-5 py-4 group flex items-center justify-between">
                        <div class="flex items-center gap-x-4">
                            <div class="text-4xl">${p.gender === "男" ? "👦" : p.gender === "女" ? "👧" : "🧍"}</div>
                            <div>
                                <div class="font-semibold text-lg">${p.name}</div>
                                <div class="text-red-500 text-sm">${p.relation}</div>
                                <div class="text-emerald-600 text-xs">${getAgeZodiac(p)}</div>
                            </div>
                            ${p.notes ? `<div class="text-xs text-slate-400 ml-4 line-clamp-2">${p.notes}</div>` : ''}
                        </div>
                        <div class="flex gap-x-2 opacity-0 group-hover:opacity-100">
                            <button onclick="editPerson(${p.id});event.stopImmediatePropagation()" class="px-4 py-2 text-sm bg-white border rounded-2xl hover:bg-slate-100">編輯</button>
                            <button onclick="deletePerson(${p.id});event.stopImmediatePropagation()" class="px-4 py-2 text-sm text-red-500 hover:bg-red-50 rounded-2xl">刪除</button>
                        </div>
                    </div>`
                })
            }
            container.innerHTML = html + `</div>`
        }

        function saveToLocalStorage() {
            localStorage.setItem("familyData_v2", JSON.stringify(familyData))
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem("familyData_v2")
            if (saved) familyData = JSON.parse(saved)
        }

        function updateRelationSuggestions() {
            const cat = document.getElementById("input-category").value
            const datalist = document.getElementById("relation-suggestions")
            datalist.innerHTML = ""
            categories[cat].forEach(rel => {
                const opt = document.createElement("option")
                opt.value = rel
                datalist.appendChild(opt)
            })
        }

        function showAddModal() {
            currentEditId = null
            document.getElementById("modal-title").textContent = "新增親戚"
            document.getElementById("save-btn").textContent = "儲存親戚"
            
            document.getElementById("input-category").value = "0"
            updateRelationSuggestions()
            document.getElementById("input-relation").value = ""
            document.getElementById("input-name").value = ""
            document.getElementById("input-birthyear").value = ""
            document.getElementById("input-notes").value = ""
            document.getElementById("input-gender").value = ""
            
            document.querySelectorAll(".gender-option").forEach(el => el.classList.remove("border-red-400", "ring-2", "ring-red-300"))
            document.getElementById("preview-age-zodiac").innerHTML = ""
            document.getElementById("modal").classList.remove("hidden")
            document.getElementById("modal").classList.add("flex")
        }

        function hideModal() {
            document.getElementById("modal").classList.add("hidden")
            document.getElementById("modal").classList.remove("flex")
        }

        function selectGender(el) {
            document.querySelectorAll(".gender-option").forEach(e => e.classList.remove("border-red-400", "ring-2", "ring-red-300"))
            el.classList.add("border-red-400", "ring-2", "ring-red-300")
            document.getElementById("input-gender").value = el.dataset.value
        }

        function previewAgeZodiac() {
            const input = document.getElementById("input-birthyear")
            const preview = document.getElementById("preview-age-zodiac")
            input.oninput = () => {
                if (!input.value) { preview.innerHTML = ""; return }
                const temp = {birthYear: parseInt(input.value)}
                preview.innerHTML = `預覽： <span class="font-semibold">${getAgeZodiac(temp)}</span>`
            }
        }

        function savePerson() {
            const category = document.getElementById("input-category").value
            const relation = document.getElementById("input-relation").value.trim()
            const name = document.getElementById("input-name").value.trim()
            const gender = document.getElementById("input-gender").value
            const birthYear = document.getElementById("input-birthyear").value ? parseInt(document.getElementById("input-birthyear").value) : null
            const notes = document.getElementById("input-notes").value.trim()

            if (!relation || !name) {
                alert("請填寫稱呼同名字")
                return
            }

            if (currentEditId === null) {
                const newPerson = { id: Date.now(), category, relation, name, gender, birthYear, notes }
                familyData.relatives.push(newPerson)
            } else {
                const person = familyData.relatives.find(p => p.id === currentEditId)
                if (person) {
                    person.category = category
                    person.relation = relation
                    person.name = name
                    person.gender = gender
                    person.birthYear = birthYear
                    person.notes = notes
                }
            }

            saveToLocalStorage()
            updateNetwork()
            renderRelativesList()
            hideModal()
        }

        function editPerson(id) {
            const person = familyData.relatives.find(p => p.id === id)
            if (!person) return
            currentEditId = id
            document.getElementById("modal-title").textContent = "編輯親戚"
            document.getElementById("save-btn").textContent = "更新資料"

            document.getElementById("input-category").value = person.category || "0"
            updateRelationSuggestions()
            document.getElementById("input-relation").value = person.relation
            document.getElementById("input-name").value = person.name
            document.getElementById("input-birthyear").value = person.birthYear || ""
            document.getElementById("input-notes").value = person.notes || ""
            document.getElementById("input-gender").value = person.gender || ""

            document.querySelectorAll(".gender-option").forEach(el => {
                el.classList.toggle("border-red-400", "ring-2", "ring-red-300", el.dataset.value === person.gender)
            })

            document.getElementById("modal").classList.remove("hidden")
            document.getElementById("modal").classList.add("flex")
        }

        function deletePerson(id) {
            if (!confirm("確定刪除？")) return
            familyData.relatives = familyData.relatives.filter(p => p.id !== id)
            saveToLocalStorage()
            updateNetwork()
            renderRelativesList()
        }

        function editMyInfo() {
            const birth = prompt("自己出生年份（可留空）\n目前：" + (familyData.myInfo.birthYear || "未填"), familyData.myInfo.birthYear || "")
            if (birth === null) return
            familyData.myInfo.birthYear = birth ? parseInt(birth) : null
            familyData.myInfo.notes = prompt("自己備註", familyData.myInfo.notes || "") || ""
            saveToLocalStorage()
            updateMyInfoCard()
            updateNetwork()
        }

        function updateMyInfoCard() {
            document.getElementById("my-name-display").textContent = familyData.myInfo.name
            document.getElementById("my-age-zodiac").innerHTML = familyData.myInfo.birthYear 
                ? `<span class="text-emerald-600">${getAgeZodiac(familyData.myInfo)}</span>` 
                : "未填出生年份"
        }

        function exportData() {
            const dataStr = JSON.stringify(familyData, null, 2)
            const blob = new Blob([dataStr], {type: "application/json"})
            const url = URL.createObjectURL(blob)
            const a = document.createElement("a")
            a.href = url
            a.download = `拜山關係圖_${new Date().toISOString().slice(0,10)}.json`
            a.click()
            URL.revokeObjectURL(url)
        }

        function importData(e) {
            const file = e.target.files[0]
            if (!file) return
            const reader = new FileReader()
            reader.onload = ev => {
                try {
                    const imported = JSON.parse(ev.target.result)
                    if (imported.myInfo && Array.isArray(imported.relatives)) {
                        familyData = imported
                        saveToLocalStorage()
                        initNetwork()
                        renderRelativesList()
                        updateMyInfoCard()
                        alert("匯入成功！")
                    }
                } catch(err) { alert("匯入失敗") }
            }
            reader.readAsText(file)
        }

        function clearAllData() {
            if (confirm("確定清空所有資料？")) {
                localStorage.removeItem("familyData_v2")
                location.reload()
            }
        }

        // 啟動
        function initialize() {
            loadFromLocalStorage()
            initNetwork()
            renderRelativesList()
            updateMyInfoCard()
            previewAgeZodiac()
        }

        window.onload = initialize
    </script>
</body>
</html>

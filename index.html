<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拜山關係圖 · 家庭人物關係圖 v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
        #mynetwork { width: 100%; height: 560px; border: 2px solid #e5e7eb; border-radius: 16px; background: #f8fafc; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div class="max-w-7xl mx-auto px-4 py-6">
        <div class="flex items-center justify-between mb-8 bg-white rounded-2xl shadow-sm border border-slate-200 px-6 py-4">
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-red-500 text-white rounded-2xl flex items-center justify-center text-2xl">👪</div>
                <div>
                    <h1 class="text-3xl font-bold">拜山關係圖 v2</h1>
                    <p class="text-slate-500 text-sm">支援多人連線 · 分類父系母系岳家</p>
                </div>
            </div>
            
            <div class="flex gap-x-3">
                <button onclick="exportData()" class="flex items-center gap-x-2 bg-emerald-600 hover:bg-emerald-700 text-white px-5 py-2.5 rounded-2xl font-medium">
                    📤 匯出 JSON
                </button>
                <label class="flex items-center gap-x-2 bg-slate-700 hover:bg-slate-800 text-white px-5 py-2.5 rounded-2xl font-medium cursor-pointer">
                    📥 匯入 JSON
                    <input id="import-input" type="file" accept=".json" class="hidden" onchange="importData(event)">
                </label>
                <button onclick="clearAllData()" class="text-red-500 hover:text-red-600">🗑️ 清空</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- 關係圖 -->
            <div class="lg:col-span-7 bg-white rounded-3xl shadow-sm border border-slate-200 p-6">
                <div class="flex justify-between mb-4">
                    <h2 class="text-2xl font-semibold">👥 人物關係圖（可手動連線）</h2>
                    <button onclick="addManualEdge()" 
                            class="px-4 py-2 text-sm bg-blue-500 text-white rounded-2xl hover:bg-blue-600">
                        + 手動連線
                    </button>
                </div>
                <div id="mynetwork"></div>
                <p class="text-xs text-slate-400 mt-3 text-center">
                    操作提示：點擊節點可編輯 • 拖拉移動 • 按住 Ctrl + 點擊兩個節點可快速連線
                </p>
            </div>

            <!-- 親戚列表 -->
            <div class="lg:col-span-5 bg-white rounded-3xl shadow-sm border border-slate-200 p-6 flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-semibold">📋 親戚列表</h2>
                    <button onclick="showAddModal()" 
                            class="flex items-center gap-x-2 bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-2xl font-medium">
                        <span class="text-xl">+</span> 新增親戚
                    </button>
                </div>
                <div class="flex-1 overflow-auto" id="relatives-list"></div>
            </div>
        </div>
    </div>

    <!-- 新增/編輯 Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="bg-white w-full max-w-lg mx-4 rounded-3xl shadow-2xl p-8">
            <h3 id="modal-title" class="text-2xl font-bold mb-6">新增親戚</h3>

            <div class="space-y-5">
                <!-- 關係類別 -->
                <div>
                    <label class="block text-sm font-medium mb-1">關係類別（顏色區分）</label>
                    <select id="input-category" class="w-full border border-slate-300 rounded-2xl px-4 py-3">
                        <option value="父系">1. 阿爸嗰邊（父系）</option>
                        <option value="母系">2. 阿媽嗰邊（母系）</option>
                        <option value="岳父系">3. 老婆阿爸嗰邊（岳父系）</option>
                        <option value="岳母系">4. 老婆阿媽嗰邊（岳母系）</option>
                        <option value="其他">其他</option>
                    </select>
                </div>

                <!-- 親戚關係 -->
                <div>
                    <label class="block text-sm font-medium mb-1">親戚關係（由你角度）</label>
                    <input id="input-relation" list="relation-suggestions" 
                           class="w-full border border-slate-300 rounded-2xl px-4 py-3 text-lg"
                           placeholder="例如：爸爸、堂哥、大伯...">
                    <datalist id="relation-suggestions">
                        <!-- 父系 -->
                        <option value="阿爺"></option><option value="阿嫲"></option>
                        <option value="伯公"></option><option value="叔公"></option><option value="伯婆"></option><option value="叔婆"></option>
                        <option value="姑婆"></option><option value="姑公"></option>
                        <option value="爸爸"></option><option value="伯父"></option><option value="大伯"></option><option value="二伯"></option>
                        <option value="伯娘"></option><option value="阿叔"></option><option value="嬸嬸"></option>
                        <option value="姑姐"></option><option value="姑丈"></option>
                        <option value="堂兄"></option><option value="堂姐"></option><option value="堂弟"></option><option value="堂妹"></option>
                        <!-- 母系 -->
                        <option value="外公"></option><option value="外嫲"></option>
                        <option value="外伯公"></option><option value="外叔公"></option>
                        <option value="姨婆"></option><option value="姨公"></option>
                        <option value="舅父"></option><option value="舅母"></option><option value="妗母"></option>
                        <option value="姨媽"></option><option value="大姨"></option><option value="姨姨"></option><option value="姨丈"></option>
                        <!-- 岳父系 -->
                        <option value="岳父"></option><option value="外父"></option><option value="老爺"></option>
                        <option value="大舅"></option><option value="舅仔"></option><option value="小舅"></option>
                        <option value="大舅奶"></option><option value="小舅奶"></option>
                        <option value="大姨"></option><option value="小姨"></option><option value="姨仔"></option>
                        <option value="襟兄"></option><option value="襟弟"></option>
                        <!-- 岳母系 -->
                        <option value="岳母"></option><option value="外母"></option>
                        <option value="外舅父"></option><option value="外舅母"></option>
                        <option value="外姨媽"></option><option value="外姨丈"></option>
                    </datalist>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1">名字 / 稱呼</label>
                        <input id="input-name" type="text" class="w-full border border-slate-300 rounded-2xl px-4 py-3 text-lg" placeholder="阿明 / 表姐阿花">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1">出生年份</label>
                        <input id="input-birthyear" type="number" class="w-full border border-slate-300 rounded-2xl px-4 py-3 text-lg" placeholder="1995">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">性別</label>
                    <div class="flex gap-4">
                        <label onclick="selectGender(this)" data-value="男" class="gender-option flex-1 text-center py-4 bg-slate-100 hover:bg-blue-100 rounded-2xl cursor-pointer">👦 男</label>
                        <label onclick="selectGender(this)" data-value="女" class="gender-option flex-1 text-center py-4 bg-slate-100 hover:bg-pink-100 rounded-2xl cursor-pointer">👧 女</label>
                    </div>
                    <input type="hidden" id="input-gender">
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1">備註</label>
                    <textarea id="input-notes" rows="3" class="w-full border border-slate-300 rounded-3xl px-4 py-3 resize-none" placeholder="電話、住址、特徵..."></textarea>
                </div>
            </div>

            <div class="flex gap-3 mt-8">
                <button onclick="hideModal()" class="flex-1 py-4 border border-slate-300 rounded-2xl hover:bg-slate-100">取消</button>
                <button onclick="savePerson()" id="save-btn" class="flex-1 py-4 bg-red-500 hover:bg-red-600 text-white font-semibold rounded-2xl">儲存</button>
            </div>
        </div>
    </div>

    <script>
        let familyData = {
            myInfo: { id: 0, name: "我", relation: "自己", gender: "", birthYear: null, notes: "", category: "自己" },
            relatives: [],
            edges: []   // 新增：自訂連線 [{from: id1, to: id2, label: "兄弟"}]
        }

        let network = null
        let nodes = null
        let edges = null
        let currentEditId = null
        let selectedForEdge = []

        const zodiacList = ["鼠","牛","虎","兔","龍","蛇","馬","羊","猴","雞","狗","豬"]
        const zodiacEmoji = ["🐭","🐮","🐯","🐰","🐲","🐍","🐴","🐑","🐒","🐔","🐶","🐷"]

        function getAgeZodiac(person) {
            if (!person.birthYear) return "";
            const age = new Date().getFullYear() - person.birthYear
            const idx = (person.birthYear - 4) % 12
            return `${age}歲　${zodiacList[idx]} ${zodiacEmoji[idx]}`
        }

        function getNodeColor(category, gender) {
            if (category === "父系") return gender === "男" ? "#3b82f6" : "#60a5fa"
            if (category === "母系") return gender === "女" ? "#ec4899" : "#f472b6"
            if (category === "岳父系" || category === "岳母系") return "#10b981"
            return "#64748b"
        }

        function getNode(person) {
            const color = getNodeColor(person.category || "其他", person.gender)
            return {
                id: person.id,
                label: person.name,
                title: `${person.relation}<br>${person.name}<br>${getAgeZodiac(person)}<br>${person.notes || ""}`,
                color: { background: color, border: "#1e2937", highlight: { background: "#f1f5f9" } },
                shape: "circle",
                size: person.id === 0 ? 45 : 35,
                font: { size: person.id === 0 ? 22 : 18, color: "#fff" }
            }
        }

        function initNetwork() {
            const container = document.getElementById("mynetwork")
            nodes = new vis.DataSet([getNode(familyData.myInfo)])
            edges = new vis.DataSet(familyData.edges.map(e => ({...e, font: {align: 'middle'}})))

            familyData.relatives.forEach(p => nodes.add(getNode(p)))

            const options = {
                nodes: { borderWidth: 3, shadow: true },
                edges: { smooth: true, font: { size: 13 } },
                physics: { barnesHut: { gravitationalConstant: -6000 } },
                interaction: { dragNodes: true, zoomView: true, hover: true, multiselect: true }
            }

            network = new vis.Network(container, { nodes, edges }, options)

            network.on("click", function(params) {
                if (params.nodes.length === 1) {
                    const id = params.nodes[0]
                    if (id === 0) editMyInfo()
                    else editPerson(id)
                }
                // Ctrl + 點兩個節點快速連線
                if (params.nodes.length === 2) {
                    addEdgeBetween(params.nodes[0], params.nodes[1])
                }
            })
        }

        function updateNetwork() {
            if (!network) return
            nodes.clear()
            edges.clear()

            nodes.add(getNode(familyData.myInfo))
            familyData.relatives.forEach(p => nodes.add(getNode(p)))
            familyData.edges.forEach(e => edges.add(e))
        }

        function renderList() {
            const container = document.getElementById("relatives-list")
            let html = ""
            familyData.relatives.forEach(p => {
                const cat = p.category || "其他"
                html += `
                <div class="bg-slate-50 border border-slate-200 rounded-3xl p-4 mb-3 flex gap-4 items-center">
                    <div class="text-4xl">${p.gender === "男" ? "👦" : p.gender === "女" ? "👧" : "🧍"}</div>
                    <div class="flex-1">
                        <div class="font-semibold">${p.name} <span class="text-red-500 text-sm">(${p.relation})</span></div>
                        <div class="text-xs text-slate-500">${cat}　${getAgeZodiac(p)}</div>
                        ${p.notes ? `<div class="text-xs text-slate-400 mt-1">${p.notes}</div>` : ''}
                    </div>
                    <div>
                        <button onclick="editPerson(${p.id});event.stopImmediatePropagation()" class="px-3 py-1 text-xs bg-white border rounded-2xl">編輯</button>
                        <button onclick="deletePerson(${p.id});event.stopImmediatePropagation()" class="px-3 py-1 text-xs text-red-500">刪</button>
                    </div>
                </div>`
            })
            container.innerHTML = html || `<div class="text-slate-400 text-center py-10">未有親戚資料，點擊上方新增</div>`
        }

        function saveToLocal() {
            localStorage.setItem("familyData_v2", JSON.stringify(familyData))
        }

        function loadFromLocal() {
            const saved = localStorage.getItem("familyData_v2")
            if (saved) familyData = JSON.parse(saved)
        }

        // Modal 功能
        function showAddModal() {
            currentEditId = null
            document.getElementById("modal-title").innerText = "新增親戚"
            document.getElementById("save-btn").innerText = "儲存親戚"
            // 清空表單
            document.getElementById("input-relation").value = ""
            document.getElementById("input-name").value = ""
            document.getElementById("input-birthyear").value = ""
            document.getElementById("input-notes").value = ""
            document.getElementById("input-gender").value = ""
            document.getElementById("input-category").value = "父系"
            document.querySelectorAll(".gender-option").forEach(el => el.classList.remove("ring-2","ring-red-400"))
            document.getElementById("modal").classList.remove("hidden")
        }

        function hideModal() {
            document.getElementById("modal").classList.add("hidden")
        }

        function selectGender(el) {
            document.querySelectorAll(".gender-option").forEach(e => e.classList.remove("ring-2","ring-red-400"))
            el.classList.add("ring-2","ring-red-400")
            document.getElementById("input-gender").value = el.dataset.value
        }

        function savePerson() {
            const relation = document.getElementById("input-relation").value.trim()
            const name = document.getElementById("input-name").value.trim()
            if (!relation || !name) {
                alert("請填寫關係同名字")
                return
            }

            const person = {
                id: currentEditId || Date.now(),
                relation,
                name,
                gender: document.getElementById("input-gender").value,
                birthYear: document.getElementById("input-birthyear").value ? parseInt(document.getElementById("input-birthyear").value) : null,
                notes: document.getElementById("input-notes").value.trim(),
                category: document.getElementById("input-category").value
            }

            if (currentEditId) {
                const idx = familyData.relatives.findIndex(p => p.id === currentEditId)
                if (idx > -1) familyData.relatives[idx] = person
            } else {
                familyData.relatives.push(person)
            }

            saveToLocal()
            updateNetwork()
            renderList()
            hideModal()
        }

        function editPerson(id) {
            const p = familyData.relatives.find(x => x.id === id)
            if (!p) return
            currentEditId = id
            document.getElementById("modal-title").innerText = "編輯親戚"
            document.getElementById("save-btn").innerText = "更新"

            document.getElementById("input-relation").value = p.relation
            document.getElementById("input-name").value = p.name
            document.getElementById("input-birthyear").value = p.birthYear || ""
            document.getElementById("input-notes").value = p.notes || ""
            document.getElementById("input-category").value = p.category || "其他"
            document.getElementById("input-gender").value = p.gender || ""

            document.querySelectorAll(".gender-option").forEach(el => {
                el.classList.toggle("ring-2", "ring-red-400", el.dataset.value === p.gender)
            })

            document.getElementById("modal").classList.remove("hidden")
        }

        function deletePerson(id) {
            if (!confirm("確定刪除？")) return
            familyData.relatives = familyData.relatives.filter(p => p.id !== id)
            // 同時刪除相關連線
            familyData.edges = familyData.edges.filter(e => e.from !== id && e.to !== id)
            saveToLocal()
            updateNetwork()
            renderList()
        }

        function editMyInfo() {
            const year = prompt("自己出生年份（留空則不計）", familyData.myInfo.birthYear || "")
            familyData.myInfo.birthYear = year ? parseInt(year) : null
            familyData.myInfo.notes = prompt("自己備註", familyData.myInfo.notes || "") || ""
            saveToLocal()
            updateNetwork()
        }

        // 手動連線功能
        function addManualEdge() {
            alert("請先在關係圖中按住 Ctrl 鍵，然後點擊兩個節點，即可快速建立連線。\n\n或者用下面方法：")
            const from = prompt("輸入起點ID（我係0，其他人ID可以喺列表或圖中睇）", "0")
            const to = prompt("輸入終點ID")
            const label = prompt("連線標籤（例如：兄弟、父子、夫妻）", "")
            if (from && to) {
                familyData.edges.push({ from: parseInt(from), to: parseInt(to), label: label || "" })
                saveToLocal()
                updateNetwork()
            }
        }

        function addEdgeBetween(id1, id2) {
            if (id1 === id2) return
            const label = prompt(`連接 ${id1} 同 ${id2}，輸入關係標籤（例如：兄弟、父子）：`, "")
            if (label !== null) {
                familyData.edges.push({ from: id1, to: id2, label: label || "" })
                saveToLocal()
                updateNetwork()
            }
        }

        function exportData() {
            const str = JSON.stringify(familyData, null, 2)
            const blob = new Blob([str], {type: "application/json"})
            const a = document.createElement("a")
            a.href = URL.createObjectURL(blob)
            a.download = `拜山關係圖_${new Date().toISOString().slice(0,10)}.json`
            a.click()
        }

        function importData(e) {
            const file = e.target.files[0]
            if (!file) return
            const reader = new FileReader()
            reader.onload = ev => {
                try {
                    familyData = JSON.parse(ev.target.result)
                    saveToLocal()
                    initNetwork()
                    renderList()
                    alert("匯入成功！")
                } catch(err) {
                    alert("匯入失敗，檔案格式錯誤")
                }
            }
            reader.readAsText(file)
        }

        function clearAllData() {
            if (confirm("確定清空所有資料？")) {
                localStorage.removeItem("familyData_v2")
                location.reload()
            }
        }

        // 啟動
        window.onload = () => {
            loadFromLocal()
            initNetwork()
            renderList()
        }
    </script>
</body>
</html>

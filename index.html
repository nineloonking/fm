<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>認親認戚圖 · 拜山過年認親神器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', system-ui, sans-serif; }
        #mynetwork { width: 100%; height: 520px; border: 2px solid #e5e7eb; border-radius: 16px; background: #f8fafc; }
        .modal { animation: modalPop 0.3s ease-out; }
        @keyframes modalPop { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div class="max-w-7xl mx-auto px-4 py-6">
        <div class="flex items-center justify-between mb-8 bg-white rounded-3xl shadow-sm border border-slate-200 px-8 py-5">
            <div class="flex items-center gap-x-4">
                <div class="w-12 h-12 bg-amber-500 text-white rounded-3xl flex items-center justify-center text-3xl">👨‍👩‍👧‍👦</div>
                <div>
                    <h1 class="text-3xl font-bold">認親認戚圖</h1>
                    <p class="text-slate-500">拜山、過年、聚會 · 即刻認清所有親戚關係</p>
                </div>
            </div>
            
            <div class="flex gap-x-3">
                <button onclick="exportData()" class="flex items-center gap-x-2 bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3 rounded-2xl font-medium">
                    📤 匯出 JSON
                </button>
                <label class="flex items-center gap-x-2 bg-slate-700 hover:bg-slate-800 text-white px-6 py-3 rounded-2xl font-medium cursor-pointer">
                    📥 匯入 JSON
                    <input id="import-input" type="file" accept=".json" class="hidden" onchange="importData(event)">
                </label>
                <button onclick="clearAllData()" class="text-red-500 hover:text-red-600 px-4 py-3">🗑️ 清空</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <!-- 關係圖 -->
            <div class="lg:col-span-7 bg-white rounded-3xl shadow-sm border p-6">
                <h2 class="text-2xl font-semibold mb-4 flex items-center gap-x-2">
                    👥 認親認戚圖
                    <span class="text-xs bg-amber-100 text-amber-700 px-3 py-1 rounded-3xl">拖拉 • 縮放 • 右鍵連線</span>
                </h2>
                <div id="mynetwork"></div>
            </div>

            <!-- 親戚列表 -->
            <div class="lg:col-span-5 bg-white rounded-3xl shadow-sm border p-6 flex flex-col">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-2xl font-semibold">親戚列表</h2>
                    <button onclick="showAddModal()" 
                            class="bg-amber-500 hover:bg-amber-600 text-white px-6 py-2.5 rounded-2xl font-medium flex items-center gap-x-2">
                        <span class="text-xl">+</span> 新增親戚
                    </button>
                </div>
                <div id="relatives-list" class="flex-1 overflow-auto space-y-3"></div>
            </div>
        </div>
    </div>

    <!-- 新增/編輯 Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur flex items-center justify-center z-50">
        <div onclick="event.stopImmediatePropagation()" class="modal bg-white w-full max-w-lg mx-4 rounded-3xl p-8 shadow-2xl">
            <h3 id="modal-title" class="text-2xl font-bold mb-6">新增親戚</h3>
            
            <div class="space-y-5">
                <!-- 關係類別 -->
                <div>
                    <label class="block text-sm font-medium mb-1.5">關係類別</label>
                    <select id="input-category" class="w-full border border-slate-300 rounded-2xl px-4 py-3 focus:outline-none focus:border-amber-400">
                        <option value="0">0. 我們一家</option>
                        <option value="1">1. 阿爸嗰邊（父系）</option>
                        <option value="2">2. 阿媽嗰邊（母系）</option>
                        <option value="3">3. 老婆/老公阿爸嗰邊（岳父/老爺系）</option>
                        <option value="4">4. 老婆/老公阿媽嗰邊（岳母系）</option>
                    </select>
                </div>

                <!-- 稱呼（關係） -->
                <div>
                    <label class="block text-sm font-medium mb-1.5">稱呼 / 關係（由你角度）</label>
                    <input id="input-relation" list="relation-suggestions" 
                           class="w-full border border-slate-300 rounded-2xl px-4 py-3 focus:outline-none focus:border-amber-400"
                           placeholder="例如：阿爸、堂哥、岳母...">
                    <datalist id="relation-suggestions">
                        <!-- 會由 JS 動態填充常用稱呼 -->
                    </datalist>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1.5">名字 / 稱呼</label>
                        <input id="input-name" type="text" class="w-full border border-slate-300 rounded-2xl px-4 py-3 focus:outline-none focus:border-amber-400" placeholder="例如：阿明">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-1.5">出生年份</label>
                        <input id="input-birthyear" type="number" min="1900" max="2030" 
                               class="w-full border border-slate-300 rounded-2xl px-4 py-3 focus:outline-none focus:border-amber-400" placeholder="1995">
                        <div id="preview-age-zodiac" class="mt-1 text-sm text-emerald-600"></div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium mb-1.5">性別</label>
                        <div class="flex gap-3">
                            <label onclick="selectGender(this)" data-value="男" class="gender-option flex-1 text-center py-4 bg-slate-100 hover:bg-blue-100 rounded-2xl cursor-pointer border-2 border-transparent">👦 男</label>
                            <label onclick="selectGender(this)" data-value="女" class="gender-option flex-1 text-center py-4 bg-slate-100 hover:bg-pink-100 rounded-2xl cursor-pointer border-2 border-transparent">👧 女</label>
                        </div>
                        <input type="hidden" id="input-gender">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-1.5">備註</label>
                    <textarea id="input-notes" rows="3" class="w-full border border-slate-300 rounded-3xl px-4 py-3 focus:outline-none resize-none" placeholder="電話、特徵、住址等..."></textarea>
                </div>
            </div>

            <div class="flex gap-3 mt-8">
                <button onclick="hideModal()" class="flex-1 py-4 border border-slate-300 rounded-2xl hover:bg-slate-100">取消</button>
                <button onclick="savePerson()" id="save-btn" class="flex-1 py-4 bg-amber-500 hover:bg-amber-600 text-white font-semibold rounded-2xl">儲存</button>
            </div>
        </div>
    </div>

    <!-- 連線 Modal -->
    <div id="connect-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur flex items-center justify-center z-50">
        <div class="bg-white w-full max-w-md mx-4 rounded-3xl p-8">
            <h3 class="text-xl font-bold mb-4">連線到其他親戚</h3>
            <p id="connect-from-name" class="mb-4 text-slate-600"></p>
            
            <select id="connect-to-id" class="w-full border border-slate-300 rounded-2xl px-4 py-3 mb-4">
                <!-- JS 動態填充 -->
            </select>

            <input id="connect-label" type="text" placeholder="關係標籤（例如：夫妻、堂兄）" 
                   class="w-full border border-slate-300 rounded-2xl px-4 py-3 mb-6">

            <div class="flex gap-3">
                <button onclick="hideConnectModal()" class="flex-1 py-4 border rounded-2xl">取消</button>
                <button onclick="addConnection()" class="flex-1 py-4 bg-amber-500 text-white rounded-2xl">建立連線</button>
            </div>
        </div>
    </div>

    <script>
        // ==================== 資料 ====================
        let familyData = {
            people: [],           // 所有人（包括主角），id:0 固定為主角
            connections: []       // 自訂連線 {from, to, label}
        }

        let network = null
        let nodes = null
        let edges = null
        let currentEditId = null
        let connectFromId = null

        const categories = [
            {id:0, name:"我們一家", suggestions:["主角","阿爸","阿媽","阿哥","細佬","家姐","阿妹","老公","老婆","仔仔","女女"]},
            {id:1, name:"阿爸嗰邊（父系）", suggestions:["阿爺","阿嫲","伯公","伯婆","叔公","叔婆","姑婆","姑公","伯父","伯娘","阿叔","嬸嬸","姑姐","姑丈","堂兄","堂姐","堂弟","堂妹","表兄","表姐","表弟","表妹"]},
            {id:2, name:"阿媽嗰邊（母系）", suggestions:["外公","外嫲","外伯公","外伯婆","外叔公","外叔婆","姨婆","姨公","舅父","舅母","妗母","姨媽","姨姨","姨丈","表兄","表姐","表弟","表妹"]},
            {id:3, name:"老婆/老公阿爸嗰邊（岳父系）", suggestions:["岳父","外父","老爺","大舅","大舅奶","舅仔","小舅奶","大姨","襟兄","姨仔","襟弟"]},
            {id:4, name:"老婆/老公阿媽嗰邊（岳母系）", suggestions:["岳母","外母","奶奶","外舅父","外舅母","外姨媽","外姨丈"]}
        ]

        const zodiacList = ["鼠","牛","虎","兔","龍","蛇","馬","羊","猴","雞","狗","豬"]
        const zodiacEmoji = ["🐭","🐮","🐯","🐰","🐲","🐍","🐴","🐑","🐒","🐔","🐶","🐷"]

        function getAgeZodiac(birthYear) {
            if (!birthYear) return "";
            const age = new Date().getFullYear() - birthYear;
            const idx = (birthYear - 4) % 12;
            const z = zodiacList[idx < 0 ? idx + 12 : idx];
            return `${age}歲 ${z} ${zodiacEmoji[idx < 0 ? idx + 12 : idx]}`;
        }

        function getNode(person) {
            const isMe = person.id === 0;
            const color = person.gender === "男" ? "#3b82f6" : person.gender === "女" ? "#ec4899" : "#64748b";
            return {
                id: person.id,
                label: person.name || person.relation || "未命名",
                title: `${person.relation || ''} ${person.name || ''}\n${getAgeZodiac(person.birthYear)}\n${person.notes || ''}`,
                color: { background: color, border: '#1e2937', highlight: {background: '#f59e0b'} },
                size: isMe ? 48 : 36,
                font: { size: isMe ? 20 : 16, color: '#fff', bold: true }
            };
        }

        function initNetwork() {
            const container = document.getElementById("mynetwork");
            nodes = new vis.DataSet();
            edges = new vis.DataSet();

            familyData.people.forEach(p => nodes.add(getNode(p)));

            // 加入自訂連線
            familyData.connections.forEach(conn => {
                edges.add({
                    from: conn.from,
                    to: conn.to,
                    label: conn.label || "",
                    arrows: "to",
                    color: {color: "#64748b"}
                });
            });

            const options = {
                nodes: { borderWidth: 4, shadow: true },
                edges: { smooth: true, font: {size: 13, align: "middle"} },
                physics: { enabled: true, barnesHut: { gravitationalConstant: -6000 } },
                interaction: { dragNodes: true, zoomView: true, hover: true }
            };

            network = new vis.Network(container, {nodes, edges}, options);

            // 左鍵點擊編輯
            network.on("click", function(params) {
                if (params.nodes.length) {
                    const id = params.nodes[0];
                    editPerson(id);
                }
            });

            // 右鍵點擊 → 連線
            network.on("oncontext", function(params) {
                params.event.preventDefault();
                if (params.nodes.length) {
                    connectFromId = params.nodes[0];
                    showConnectModal();
                }
            });

            // 右鍵邊線 → 刪除連線
            network.on("oncontext", function(params) {
                if (params.edges.length) {
                    if (confirm("刪除呢條連線？")) {
                        edges.remove(params.edges[0]);
                        familyData.connections = familyData.connections.filter(c => 
                            !(c.from === edges.get(params.edges[0]).from && c.to === edges.get(params.edges[0]).to)
                        );
                        saveToLocal();
                    }
                }
            });
        }

        function updateNetwork() {
            if (!network) return;
            nodes.clear();
            edges.clear();
            familyData.people.forEach(p => nodes.add(getNode(p)));
            familyData.connections.forEach(conn => {
                edges.add({from: conn.from, to: conn.to, label: conn.label, arrows: "to"});
            });
        }

        function renderList() {
            const container = document.getElementById("relatives-list");
            let html = "";
            familyData.people.forEach(person => {
                html += `
                <div class="bg-slate-50 hover:bg-white border border-slate-200 rounded-3xl p-5 flex gap-4 items-start group">
                    <div class="text-4xl">${person.gender === "男" ? "👦" : person.gender === "女" ? "👧" : "🧍"}</div>
                    <div class="flex-1">
                        <div class="font-semibold">${person.name || person.relation}</div>
                        <div class="text-amber-600 text-sm">${person.relation}</div>
                        <div class="text-xs text-emerald-600">${getAgeZodiac(person.birthYear)}</div>
                        ${person.notes ? `<div class="text-xs text-slate-500 mt-1 line-clamp-2">${person.notes}</div>` : ''}
                    </div>
                    <div class="opacity-0 group-hover:opacity-100 flex flex-col gap-1">
                        <button onclick="editPerson(${person.id});event.stopImmediatePropagation()" class="px-4 py-1 text-xs bg-white border rounded-2xl">編輯</button>
                        ${person.id !== 0 ? `<button onclick="deletePerson(${person.id});event.stopImmediatePropagation()" class="px-4 py-1 text-xs text-red-500">刪除</button>` : ''}
                    </div>
                </div>`;
            });
            container.innerHTML = html || `<div class="text-center py-12 text-slate-400">未有親戚資料，點擊新增開始認親</div>`;
        }

        function saveToLocal() {
            localStorage.setItem("familyData_v2", JSON.stringify(familyData));
        }

        function loadFromLocal() {
            const saved = localStorage.getItem("familyData_v2");
            if (saved) familyData = JSON.parse(saved);
            
            // 確保主角存在
            if (!familyData.people || familyData.people.length === 0) {
                familyData.people = [{
                    id: 0,
                    relation: "我",
                    name: "我",
                    gender: "",
                    birthYear: null,
                    notes: ""
                }];
            }
            if (!familyData.connections) familyData.connections = [];
        }

        function showAddModal() {
            currentEditId = null;
            document.getElementById("modal-title").textContent = "新增親戚";
            document.getElementById("save-btn").textContent = "儲存親戚";
            
            document.getElementById("input-relation").value = "";
            document.getElementById("input-name").value = "";
            document.getElementById("input-birthyear").value = "";
            document.getElementById("input-notes").value = "";
            document.getElementById("input-gender").value = "";
            document.querySelectorAll(".gender-option").forEach(el => el.classList.remove("border-amber-400","ring-2"));
            
            document.getElementById("modal").classList.remove("hidden");
            document.getElementById("modal").classList.add("flex");
        }

        function hideModal() {
            document.getElementById("modal").classList.add("hidden");
            document.getElementById("modal").classList.remove("flex");
        }

        function selectGender(el) {
            document.querySelectorAll(".gender-option").forEach(e => e.classList.remove("border-amber-400","ring-2","ring-amber-300"));
            el.classList.add("border-amber-400","ring-2","ring-amber-300");
            document.getElementById("input-gender").value = el.dataset.value;
        }

        function savePerson() {
            const relation = document.getElementById("input-relation").value.trim();
            const name = document.getElementById("input-name").value.trim();
            const gender = document.getElementById("input-gender").value;
            const birthYear = document.getElementById("input-birthyear").value ? parseInt(document.getElementById("input-birthyear").value) : null;
            const notes = document.getElementById("input-notes").value.trim();

            if (!relation && !name) {
                alert("請至少填寫稱呼或名字");
                return;
            }

            if (currentEditId === null) {
                // 新增
                const newId = familyData.people.length > 0 ? Math.max(...familyData.people.map(p => p.id)) + 1 : 1;
                familyData.people.push({
                    id: newId,
                    relation: relation || name,
                    name: name || relation,
                    gender,
                    birthYear,
                    notes
                });
            } else {
                // 編輯
                const person = familyData.people.find(p => p.id === currentEditId);
                if (person) {
                    person.relation = relation || name;
                    person.name = name || relation;
                    person.gender = gender;
                    person.birthYear = birthYear;
                    person.notes = notes;
                }
            }

            saveToLocal();
            updateNetwork();
            renderList();
            hideModal();
        }

        function editPerson(id) {
            const person = familyData.people.find(p => p.id === id);
            if (!person) return;

            currentEditId = id;
            document.getElementById("modal-title").textContent = "編輯資料";
            document.getElementById("save-btn").textContent = "更新";

            document.getElementById("input-relation").value = person.relation || "";
            document.getElementById("input-name").value = person.name || "";
            document.getElementById("input-birthyear").value = person.birthYear || "";
            document.getElementById("input-notes").value = person.notes || "";
            document.getElementById("input-gender").value = person.gender || "";

            document.querySelectorAll(".gender-option").forEach(el => {
                el.classList.toggle("border-amber-400", el.dataset.value === person.gender);
            });

            document.getElementById("modal").classList.remove("hidden");
            document.getElementById("modal").classList.add("flex");
        }

        function deletePerson(id) {
            if (id === 0) return alert("主角唔可以刪除");
            if (!confirm("確定刪除？")) return;
            familyData.people = familyData.people.filter(p => p.id !== id);
            familyData.connections = familyData.connections.filter(c => c.from !== id && c.to !== id);
            saveToLocal();
            updateNetwork();
            renderList();
        }

        // ==================== 連線功能 ====================
        function showConnectModal() {
            const fromPerson = familyData.people.find(p => p.id === connectFromId);
            document.getElementById("connect-from-name").innerHTML = `從 <b>${fromPerson.name || fromPerson.relation}</b> 連線到 →`;

            const select = document.getElementById("connect-to-id");
            select.innerHTML = `<option value="">選擇親戚...</option>`;
            
            familyData.people.forEach(p => {
                if (p.id !== connectFromId) {
                    select.innerHTML += `<option value="${p.id}">${p.name || p.relation}</option>`;
                }
            });

            document.getElementById("connect-label").value = "";
            document.getElementById("connect-modal").classList.remove("hidden");
            document.getElementById("connect-modal").classList.add("flex");
        }

        function hideConnectModal() {
            document.getElementById("connect-modal").classList.add("hidden");
            document.getElementById("connect-modal").classList.remove("flex");
        }

        function addConnection() {
            const toId = parseInt(document.getElementById("connect-to-id").value);
            const label = document.getElementById("connect-label").value.trim();
            if (!toId) return alert("請選擇連線對象");

            // 避免重複連線
            const exists = familyData.connections.some(c => 
                (c.from === connectFromId && c.to === toId) || (c.from === toId && c.to === connectFromId)
            );
            if (exists) {
                alert("已經有連線啦！");
                hideConnectModal();
                return;
            }

            familyData.connections.push({
                from: connectFromId,
                to: toId,
                label: label || "關係"
            });

            saveToLocal();
            updateNetwork();
            hideConnectModal();
        }

        // ==================== 匯出匯入 ====================
        function exportData() {
            const str = JSON.stringify(familyData, null, 2);
            const blob = new Blob([str], {type: "application/json"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = `認親認戚圖_${new Date().toISOString().slice(0,10)}.json`;
            a.click();
        }

        function importData(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(ev) {
                try {
                    familyData = JSON.parse(ev.target.result);
                    if (!familyData.people) familyData.people = [];
                    if (!familyData.connections) familyData.connections = [];
                    saveToLocal();
                    updateNetwork();
                    renderList();
                    alert("匯入成功！");
                } catch(err) {
                    alert("檔案格式錯誤");
                }
            };
            reader.readAsText(file);
        }

        function clearAllData() {
            if (confirm("清空所有資料？呢個動作冇得反悔！")) {
                localStorage.removeItem("familyData_v2");
                location.reload();
            }
        }

        // 即時預覽年齡生肖
        function setupPreview() {
            const input = document.getElementById("input-birthyear");
            const preview = document.getElementById("preview-age-zodiac");
            input.addEventListener("input", () => {
                preview.textContent = input.value ? getAgeZodiac(parseInt(input.value)) : "";
            });
        }

        // 初始化
        window.onload = function() {
            loadFromLocal();
            initNetwork();
            renderList();
            setupPreview();

            // 預設填充一些常見稱呼到 datalist
            const datalist = document.getElementById("relation-suggestions");
            categories.forEach(cat => {
                cat.suggestions.forEach(s => {
                    const opt = document.createElement("option");
                    opt.value = s;
                    datalist.appendChild(opt);
                });
            });
        };
    </script>
</body>
</html>
